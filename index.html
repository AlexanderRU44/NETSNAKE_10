<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NetSnake 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-theme">

    <h1>NETSNAKE 10</h1>

    <div class="phone-wrapper">
        <div class="screen">
            <div class="hud" id="hud">
                <span id="score">СЧЕТ:0</span>
                <span id="hi-score">РЕКОРД:...</span>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="name-input-overlay" id="nameOverlay">
                <label id="overlayLabel"></label>
                <input type="text" id="nameInput" maxlength="8" autofocus autocomplete="off">
                <button id="btnSaveName"></button>
            </div>

            <div class="timer-bar-container" id="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>
        </div>

        <div class="dpad-container">
            <button class="btn btn-side" id="btn-menu">MENU</button>
            <button class="btn btn-dir" id="btn-up">▲</button>
            <button class="btn btn-side" id="btn-back">BACK</button>
            
            <button class="btn btn-dir" id="btn-left">◀</button>
            <button class="btn btn-center" id="btn-space">OK</button>
            <button class="btn btn-dir" id="btn-right">▶</button>
            
            <button class="btn btn-dir" id="btn-down">▼</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
