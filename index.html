            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;

        body.light-theme { background-color: #f0f2f5; color: #333; }

                }
            }
        };

        let currentScreen = "MAIN", mainMenuSelection = 0, settingsMenuSelection = 0, modesMenuSelection = 0;
        let mainMenuScrollY = 0; 
        let tasksScrollY = 0; 
        const maxTasksScrollY = 160; 
        let aboutScrollY = 0;
        const maxAboutScrollY = 160;
        let gameInterval = null;
        
        let audioCtx = null;
        let musicNode = null; 
        let globalTopTen = []; 
        let isLoadingLeaderboard = false;

        async function loadAboutText() {
            try {
                const response = await fetch('about.json');
                externalAboutData = await response.json();
            } catch (e) {
                console.error(e);
                externalAboutData = { 
                    RU: ["ОШИБКА ЗАГРУЗКИ ДАННЫХ.", "ЗАПУСТИТЕ ЧЕРЕЗ ЛОКАЛЬНЫЙ СЕРВЕР", "(НАПРИМЕР, LIVE SERVER В VS CODE)."], 
                    EN: ["DATA LOADING ERROR.", "RUN VIA A LOCAL SERVER", "(E.G. VS CODE LIVE SERVER)."] 
                };
            }
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startBackgroundMusic();
            }
        }

        function startBackgroundMusic() {
            if (!soundEnabled || musicNode || !audioCtx) return;

            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            
            const notes = [110, 130, 146, 165, 110, 130, 196, 165]; 
            const noteLen = Math.floor(bufferSize / notes.length);

            for (let i = 0; i < bufferSize; i++) {
                const noteIdx = Math.floor(i / noteLen);
                const freq = notes[noteIdx];
                data[i] = Math.sin(2 * Math.PI * freq * (i / audioCtx.sampleRate)) > 0 ? 0.015 : -0.015;
            }

            musicNode = audioCtx.createBufferSource();
            musicNode.buffer = buffer;
            musicNode.loop = true;
            
            const musicGain = audioCtx.createGain();
            musicGain.gain.setValueAtTime(isPaused ? 0 : 0.6, audioCtx.currentTime); 

            musicNode.connect(musicGain);
            musicGain.connect(audioCtx.destination);
            musicNode.start();
            musicNode.gainNode = musicGain;
        }

        function updateMusicVolume() {
            if (musicNode && musicNode.gainNode) {
                musicNode.gainNode.gain.setValueAtTime((isPaused || !soundEnabled) ? 0 : 0.6, audioCtx.currentTime);
            }
        }

        function stopBackgroundMusic() {
            if (musicNode) {
                try { musicNode.stop(); } catch(e){}
                musicNode.disconnect();
                musicNode = null;
            }
        }

        function triggerVibration() {
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function completeTask(id) {
            if (id === "cyborg") {
                if (!isCyborgAchievementDone) {
                    isCyborgAchievementDone = true;
                    localStorage.setItem("snake_cyborg_achieved", "true");
                    isChameleonUnlocked = true;
                    localStorage.setItem("snake_chameleon_unlocked", "true");
                    playSound("taskComplete");
                    spawnGift();
                }
                return;
            }
            if (!tasks[id]) {
                tasks[id] = true;
                playSound("taskComplete");
                spawnGift(); 
            }
        }

        function addFloatingScore(x, y, text) {
            floatingScores.push({ x: x * 20 + 10, y: y * 20, text: text, alpha: 1.0, life: 15 });
        }

        function generateObstacles() {
            obstacles = [];
            flashingObstacleIdx = -1;
            if (currentModeIdx !== 2 && currentModeIdx !== 4) return; 
            while (obstacles.length < 8) {
                let obsX = Math.floor(Math.random() * tileCount);
                let obsY = Math.floor(Math.random() * tileCount);
                let distance = Math.abs(obsX - 10) + Math.abs(obsY - 10);
                if (distance > 3) {
                    if (!obstacles.some(o => o.x === obsX && o.y === obsY)) {
                        obstacles.push({x: obsX, y: obsY});
                    }
                }
            }
        }

        function moveOneObstacle() {
            if (obstacles.length === 0) return;
            let idx = Math.floor(Math.random() * obstacles.length);
            
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(part => part.x === x && part.y === y) || 
                                     obstacles.some(o => o.x === x && o.y === y) ||
                                     ghostTrails.some(g => g.x === x && g.y === y) ||
                                     (food.x === x && food.y === y) || 
                                     (gift && gift.x === x && gift.y === y);
                    if (!isOccupied && (Math.abs(x - snake[0].x) + Math.abs(y - snake[0].y) > 2)) {
                        validPositions.push({x, y});
                    }
                }
            }
            if (validPositions.length > 0) {
                obstacles[idx] = validPositions[Math.floor(Math.random() * validPositions.length)];
            }
        }

        function spawnGift() {
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(part => part.x === x && part.y === y) || 
                                     obstacles.some(o => o.x === x && o.y === y) ||
                                     ghostTrails.some(g => g.x === x && g.y === y) ||
                                     (food.x === x && food.y === y) || 
                                     (gift && gift.x === x && gift.y === y);
                    if (!isOccupied) validPositions.push({x, y});
                }
            }
            if (validPositions.length > 0) {
                gift = validPositions[Math.floor(Math.random() * validPositions.length)];
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.onended = () => {
                osc.disconnect();
                gain.disconnect();
            };

            if (type === "eat") {
                osc.type = "square";
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === "bigEat") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === "shrinkEat") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === "turboEat") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === "giftEat") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.07);
                osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.14);
                osc.frequency.setValueAtTime(1046, audioCtx.currentTime + 0.21);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === "die") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === "taskComplete") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }
        }

        function makeAIMove() {
            const head = snake[0];
            const queue = [ [head.x, head.y, []] ];
            const visited = Array.from({ length: tileCount }, () => Array(tileCount).fill(false));
            visited[head.x][head.y] = true;

            for (let i = 0; i < snake.length - 1; i++) visited[snake[i].x][snake[i].y] = true;
            obstacles.forEach(o => visited[o.x][o.y] = true);
            ghostTrails.forEach(g => visited[g.x][g.y] = true);

            const directions = [
                { x: 0, y: -1, name: "UP" },
                { x: 0, y: 1, name: "DOWN" },
                { x: -1, y: 0, name: "LEFT" },
                { x: 1, y: 0, name: "RIGHT" }
            ];

            let pathToTarget = null;
            let targetX = gift ? gift.x : food.x;
            let targetY = gift ? gift.y : food.y;

            const bordersAreDeadly = (currentModeIdx === 1);

            while (queue.length > 0) {
                const [cx, cy, path] = queue.shift();
                if (cx === targetX && cy === targetY) { pathToTarget = path; break; }

                for (const d of directions) {
                    let nx = cx + d.x;
                    let ny = cy + d.y;
                    
                    if (!bordersAreDeadly) {
                        if (nx < 0) nx = tileCount - 1; if (nx >= tileCount) nx = 0;
                        if (ny < 0) ny = tileCount - 1; if (ny >= tileCount) ny = 0;
                    } else {
                        if (nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount) continue;
                    }
                    if (!visited[nx][ny]) {
                        visited[nx][ny] = true;
                        queue.push([nx, ny, [...path, d.name]]);
                    }
                }
            }

            let nextMove = null;
            if (pathToTarget && pathToTarget.length > 0) {
                nextMove = pathToTarget[0];
            } else {
                for (const d of directions) {
                    if (snake.length > 1) {
                        let potentialX = head.x + d.x;
                        let potentialY = head.y + d.y;
                        if (!bordersAreDeadly) {
                            if (potentialX < 0) potentialX = tileCount - 1; if (potentialX >= tileCount) potentialX = 0;
                            if (potentialY < 0) potentialY = tileCount - 1; if (potentialY >= tileCount) potentialY = 0;
                        }
                        if (potentialX === snake[1].x && potentialY === snake[1].y) continue;
                    }

                    let nx = head.x + d.x;
                    let ny = head.y + d.y;

                    if (!bordersAreDeadly) {
                        if (nx < 0) nx = tileCount - 1; if (nx >= tileCount) nx = 0;
                        if (ny < 0) ny = tileCount - 1; if (ny >= tileCount) ny = 0; 
                    } else {
                        if (nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount) continue;
                    }

                    let hitsSelf = false;
                    for (let i = 0; i < snake.length - 1; i++) {
                        if (snake[i].x === nx && snake[i].y === ny) hitsSelf = true;
                    }
                    if (obstacles.some(o => o.x === nx && o.y === ny)) hitsSelf = true;
                    if (ghostTrails.some(g => g.x === nx && g.y === ny)) hitsSelf = true;

                    if (!hitsSelf) { nextMove = d.name; break; }
                }
            }

            if (nextMove) {
                if (nextMove === "UP") { nextDx = 0; nextDy = -1; }
                if (nextMove === "DOWN") { nextDx = 0; nextDy = 1; }
                if (nextMove === "LEFT") { nextDx = -1; nextDy = 0; }
                if (nextMove === "RIGHT") { nextDx = 1; nextDy = 0; }
            }
        }

        function gameLoop() {
            clearCanvas();
            const t = i18n[currentLang];
            flashCounter++; if (flashCounter % 3 === 0) flashToggle = !flashToggle;
            rainbowHue = (rainbowHue + 5) % 360; 

            if (isPaused) { 
                timerContainer.style.visibility = "hidden";
                drawObstacles(); drawGhostTrails(); drawSnake(); drawFood(); drawGift();
                drawFloatingScores();
                
                if (currentScreen === "MAIN") {
                    if (gameOver) drawPixelMenu(t.gameOver);
                    else drawPixelMenu(t.pause);
                }
                else if (currentScreen === "SETTINGS") drawPixelMenu(t.settings);
                else if (currentScreen === "MODES") drawModesScreen();
                else if (currentScreen === "LEADERBOARD") drawLeaderboardScreen();
                else if (currentScreen === "TASKS") drawTasksScreen();
                else if (currentScreen === "ACHIEVEMENTS") drawAchievementsScreen();
                else if (currentScreen === "ABOUT") drawAboutScreen();
                return; 
            }

            if (foodType !== "REGULAR") {
                let currentTickSpeed = isTurboActive ? speeds[2] : speeds[currentSpeedMode];
                bonusTimer -= currentTickSpeed;
                timerContainer.style.visibility = "visible";
                
                let maxTime = maxBigFoodTime;
                if (foodType === "SHRINK") maxTime = maxShrinkTime;
                if (foodType === "TURBO") maxTime = maxTurboTime;

                const percentage = Math.max(0, (bonusTimer / maxTime) * 100);
                timerBar.style.width = percentage + "%";
                if (bonusTimer <= 0) { 
                    foodType = "REGULAR"; 
                    isTurboActive = false;
                    timerContainer.style.visibility = "hidden"; 
                    updateTicker();
                    generateFood(); 
                }
            } else { 
                timerContainer.style.visibility = "hidden"; 
            }

            if (aiMode) makeAIMove();
            dx = nextDx; dy = nextDy;
            isTurningThisTick = false; 
            
            if (currentModeIdx === 4) {
                movingObstacleTick++;
                if (movingObstacleTick >= 12) {
                    if (flashingObstacleIdx === -1) {
                        flashingObstacleIdx = Math.floor(Math.random() * obstacles.length);
                    }
                }
                if (movingObstacleTick >= 15) {
                    moveOneObstacle();
                    flashingObstacleIdx = -1;
                    movingObstacleTick = 0;
                }
            }

            moveSnake();
            if (!gameOver) { 
                checkCollision(); 
                drawObstacles(); drawGhostTrails(); drawFood(); drawGift(); drawSnake(); 
                drawFloatingScores();
            }
        }

        function updateTicker() {
            if (gameInterval) clearInterval(gameInterval);
            let activeSpeed = isTurboActive ? speeds[2] : speeds[currentSpeedMode];
            gameInterval = setInterval(gameLoop, activeSpeed);
        }

            ctx.fillStyle = "#ffffff"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.achievementsTitle, 200, 45); ctx.fillRect(40, 54, 320, 2);
            
            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            let isDone = isCyborgAchievementDone;
            ctx.fillStyle = isDone ? "#ffffff" : (isDarkTheme ? "#484f58" : "#6c7d93");
            ctx.fillText(`${isDone ? "[X]" : "[ ]"} ${t.taskList["cyborg"]}`, 42, 95);
            ctx.font = "7.5px 'Press Start 2P'"; ctx.fillStyle = isDone ? "#ffffff" : (isDarkTheme ? "#8b949e" : "#a2b0c3"); 
            ctx.fillText(t.taskList["cyborgDesc"], 42, 110);
            
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(t.back, 200, 365);
        }

        function drawAboutScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = isDarkTheme ? "#161b22" : "#2b3a4a"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#ffffff"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.aboutTitle, 200, 45); ctx.fillRect(40, 54, 320, 2);
            ctx.save(); ctx.beginPath(); ctx.rect(30, 60, 340, 265); ctx.clip();
            ctx.textAlign = "left";
            
            const textLines = externalAboutData[currentLang] || [];
            textLines.forEach((line, idx) => {
                let y = 85 + (idx * 18) - aboutScrollY;
                ctx.font = (idx === 0) ? "10px 'Press Start 2P'" : "7.5px 'Press Start 2P'";
                
                let isHeader = idx === 0 || line.startsWith("УПРАВЛЕНИЕ:") || line.startsWith("CONTROLS:") || line.startsWith("ОСОБЕННОСТИ:") || line.startsWith("FEATURES:");
                ctx.fillStyle = isHeader ? "#ffffff" : (isDarkTheme ? "#8b949e" : "#a2b0c3");
                ctx.fillText(line, 40, y);
            });
            ctx.restore();
            ctx.fillStyle = isDarkTheme ? "#21262d" : "#1b2530"; ctx.fillRect(355, 65, 4, 255); 
            ctx.fillStyle = "#ffffff"; ctx.fillRect(355, 65 + (aboutScrollY / maxAboutScrollY) * 135, 4, 120); 
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(t.back, 200, 365);
        }

        function openNameInput() {
            const t = i18n[currentLang];
            overlayLabel.innerText = t.enterName;
            btnSaveName.innerText = t.saveBtn; 
            nameInput.value = playerName;
            nameOverlay.style.display = "flex";
            currentScreen = "EDIT_NAME";
            setTimeout(() => nameInput.focus(), 50); 
        }

        function saveNameInput() {
            let val = nameInput.value.trim().toUpperCase();
            val = val.replace(/[^A-ZА-Я0-9_]/g, '');
            if (val === "") val = "PLAYER";
            playerName = val.substring(0, 8);
            localStorage.setItem("snake_player_name", playerName);
            nameOverlay.style.display = "none";
            currentScreen = "SETTINGS";
            updateHUD();
        }

        btnSaveName.onclick = (e) => { e.preventDefault(); triggerVibration(); saveNameInput(); };
        nameInput.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); saveNameInput(); } };

        function moveSnake() {
            let h = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            const bordersAreDeadly = (currentModeIdx === 1);
            if (!bordersAreDeadly || aiMode) {
                if (h.x < 0) h.x = tileCount - 1; if (h.x > tileCount - 1) h.x = 0;
                if (h.y < 0) h.y = tileCount - 1; if (h.y > tileCount - 1) h.y = 0;
            }
            
            if (currentModeIdx === 3 && snake.length > 0) ghostTrails.push({ x: snake[snake.length - 1].x, y: snake[snake.length - 1].y, ttl: 25 });
            ghostTrails.forEach(gt => gt.ttl--); ghostTrails = ghostTrails.filter(gt => gt.ttl > 0);
            snake.unshift(h);

            if (gift && h.x === gift.x && h.y === gift.y) { 
                playSound("giftEat"); 
                score += 50; 
                addFloatingScore(h.x, h.y, "+50");
                gift = null; 
                checkScoreTasks(); 
                updateHUD(); 
            }

            if (h.x === food.x && h.y === food.y) {
                if (foodType === "REGULAR") { 
                    playSound("eat"); 
                    let gain = isTurboActive ? 3 : 1;
                    score += gain; 
                    addFloatingScore(h.x, h.y, `+${gain}`);
                } 
                else if (foodType === "BIG") { 
                    playSound("bigEat"); 
                    score += 10; 
                    addFloatingScore(h.x, h.y, "+10");
                    goldFoodEaten = true; 
                    completeTask("goldFood"); 
                } 
                else if (foodType === "SHRINK") { 
                    playSound("shrinkEat"); 
                    blueFoodEaten = true; 
                    completeTask("blueFood"); 
                    let newLength = Math.max(1, Math.floor(snake.length / 2)); 
                    while (snake.length > newLength) snake.pop(); 
                    addFloatingScore(h.x, h.y, "SHRINK");
                }
                else if (foodType === "TURBO") { 
                    playSound("turboEat");
                    isTurboActive = true;
                    bonusTimer = maxTurboTime;
                    addFloatingScore(h.x, h.y, "TURBO!");
                    updateTicker(); 
                }
                checkScoreTasks(); 
                if (foodType !== "TURBO") {
                    foodType = "REGULAR"; 
                    if (!isTurboActive) timerContainer.style.visibility = "hidden";
                }
                updateHUD(); 
                generateFood();
            } else {
                snake.pop();
            }
            if (snake.length >= tileCount * tileCount) completeTask("fullField");
        }

        function checkScoreTasks() {
            if (score >= 50) completeTask("score50");
            if (score >= 100) completeTask("score100");
            if (score >= 500) completeTask("score500");
            if (score >= 1000) completeTask("score1000");
        }

        function generateFood() {
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(p => p.x === x && p.y === y) || obstacles.some(o => o.x === x && o.y === y) || ghostTrails.some(g => g.x === x && g.y === y) || (gift && gift.x === x && gift.y === y);
                    if (!isOccupied) validPositions.push({x, y});
                }
            }
            if (validPositions.length === 0) { completeTask("fullField"); if (!aiMode) endGame(); return; }
            food = validPositions[Math.floor(Math.random() * validPositions.length)];
            
            if (isTurboActive) {
                foodType = "REGULAR"; 
                return;
            }

            let rand = Math.random();
            if (rand < 0.05 && !blueFoodEaten) { foodType = "SHRINK"; bonusTimer = maxShrinkTime; } 
            else if (rand < 0.10) { foodType = "TURBO"; bonusTimer = maxTurboTime; } 
            else if (rand < 0.20 && !goldFoodEaten) { foodType = "BIG"; bonusTimer = maxBigFoodTime; } 
            else foodType = "REGULAR";
        }

        function checkCollision() {
            if (aiMode) return; 
            let h = snake[0];
            
            if (currentModeIdx === 1 && (h.x < 0 || h.x > tileCount - 1 || h.y < 0 || h.y > tileCount - 1)) { 
                endGame(); 
                return; 
            }
            
            for(let i=1; i<snake.length; i++) if(h.x===snake[i].x && h.y===snake[i].y) endGame();
            if ((currentModeIdx === 2 || currentModeIdx === 4) && obstacles.some(obs => obs.x === h.x && obs.y === h.y)) endGame(); 
            if (ghostTrails.some(gt => gt.x === h.x && gt.y === h.y)) endGame();
        }

        function endGame() {
            playSound("die"); 
            gameOver = true; 
            isPaused = true; 
            isTurboActive = false;
            currentScreen = "MAIN"; 
            mainMenuSelection = 0; 
            mainMenuScrollY = 0; 
            updateMusicVolume();
            updateHUD(); 
            sendScoreToFirebase(score); 
        }

        function handleMenuPress() { initAudio(); if (currentScreen !== "EDIT_NAME") { if (!isPaused) { isPaused = true; updateMusicVolume(); } currentScreen = "MAIN"; } }
        function handleBackPress() { initAudio(); if (currentScreen !== "EDIT_NAME") { if (["SETTINGS","LEADERBOARD","TASKS","ACHIEVEMENTS","MODES","ABOUT"].includes(currentScreen)) currentScreen = "MAIN"; } }

        async function handleCenter() {
            initAudio();
            if (currentScreen === "EDIT_NAME") { saveNameInput(); return; }
            if (!isPaused && !gameOver && cheatSequence.length === 3 && cheatSequence.every((val, i) => val === targetCheat[i])) {
                aiMode = !aiMode; if (aiMode) { usedAIThisSession = true; completeTask("cyborg"); }
                updateHUD(); cheatSequence = []; return; 
            }
            cheatSequence = []; 
            if (currentScreen === "MAIN") {
                if (gameOver) {
                    if (mainMenuSelection === 0) reset();
                    else if (mainMenuSelection === 1) { currentScreen = "MODES"; modesMenuSelection = currentModeIdx; }
                    else if (mainMenuSelection === 2) { currentScreen = "SETTINGS"; settingsMenuSelection = 0; }
                    else if (mainMenuSelection === 3) { currentScreen = "LEADERBOARD"; loadTopTen(); }
                    else if (mainMenuSelection === 4) { currentScreen = "TASKS"; tasksScrollY = 0; }
                    else if (mainMenuSelection === 5) { currentScreen = "ACHIEVEMENTS"; }
                    else if (mainMenuSelection === 6) { currentScreen = "ABOUT"; aboutScrollY = 0; }
                } else {
                    if (mainMenuSelection === 0) { isPaused = false; updateMusicVolume(); }
                    else if (mainMenuSelection === 1) reset();
                    else if (mainMenuSelection === 2) { currentScreen = "MODES"; modesMenuSelection = currentModeIdx; }
                    else if (mainMenuSelection === 3) { currentScreen = "SETTINGS"; settingsMenuSelection = 0; }
                    else if (mainMenuSelection === 4) { currentScreen = "LEADERBOARD"; loadTopTen(); }
                    else if (mainMenuSelection === 5) { currentScreen = "TASKS"; tasksScrollY = 0; }
                    else if (mainMenuSelection === 6) { currentScreen = "ACHIEVEMENTS"; }
                    else if (mainMenuSelection === 7) { currentScreen = "ABOUT"; aboutScrollY = 0; }
                }
            } else if (currentScreen === "MODES") { 
                currentModeIdx = modesMenuSelection; 
                updateHUD(); 
                await loadBestSingleScore(); 
                reset(); 
            } else if (currentScreen === "SETTINGS") {
                let s = settingsMenuSelection;
                if (s === 0) { currentSpeedMode = (currentSpeedMode + 1) % 3; updateTicker(); }
                else if (s === 1) { 
                    soundEnabled = !soundEnabled; 
                    localStorage.setItem("snake_sound_enabled", soundEnabled); 
                    if (soundEnabled) startBackgroundMusic(); else stopBackgroundMusic();
                    updateMusicVolume();
                }
                else if (s === 2) { currentLang = (currentLang === "RU") ? "EN" : "RU"; updateHUD(); }
                else if (s === 3) openNameInput();
                else if (s === 4) { 
                    let nextColorIdx = (currentSnakeColorIdx + 1) % snakeColors.length;
                    if (nextColorIdx === 4 && !isChameleonUnlocked) nextColorIdx = 0; 
                    currentSnakeColorIdx = nextColorIdx;
                    localStorage.setItem("snake_color_idx", currentSnakeColorIdx); 
                }
                else if (s === 5) {
                    // Обработка клика на пункт ТЕМА
                    isDarkTheme = !isDarkTheme;
                    localStorage.setItem("snake_dark_theme", isDarkTheme);
                    applyTheme();
                }
            } else if (!isPaused) {
                isPaused = true;
                updateMusicVolume();
            }
        }

        function reset() {
            gift = null; goldFoodEaten = false; blueFoodEaten = false; isTurboActive = false; snake = [{x: 10, y: 10}]; ghostTrails = []; floatingScores = [];
            movingObstacleTick = 0; flashingObstacleIdx = -1;
            
            tasks = {
                score50: false, score100: false, score500: false, score1000: false,
                goldFood: false, blueFood: false, fullField: false
            };

            generateObstacles(); dx = 1; dy = 0; nextDx = 1; nextDy = 0; score = 0; gameOver = false; isPaused = false; foodType = "REGULAR";
            aiMode = false; usedAIThisSession = false; mainMenuSelection = 0; mainMenuScrollY = 0; timerContainer.style.visibility = "hidden"; generateFood(); updateMusicVolume(); updateTicker(); updateHUD(); cheatSequence = [];
        }

        function handleInput(act) {
            if (currentScreen === "EDIT_NAME") return; 
            initAudio();
            if (!isPaused) {
                cheatSequence.push(act); if (cheatSequence.length > 3) cheatSequence.shift(); 
                if (aiMode) return; 
                if (isTurningThisTick) return; 

                if (act === "UP" && dy === 0) { nextDx = 0; nextDy = -1; isTurningThisTick = true; }
                else if (act === "DOWN" && dy === 0) { nextDx = 0; nextDy = 1; isTurningThisTick = true; }
                else if (act === "LEFT" && dx === 0) { nextDx = -1; nextDy = 0; isTurningThisTick = true; }
                else if (act === "RIGHT" && dx === 0) { nextDx = 1; nextDy = 0; isTurningThisTick = true; }
            } else {
                if (currentScreen === "MAIN") { let max = gameOver ? 6 : 7; if (act === "UP") mainMenuSelection = (mainMenuSelection <= 0) ? max : mainMenuSelection - 1; if (act === "DOWN") mainMenuSelection = (mainMenuSelection >= max) ? 0 : mainMenuSelection + 1; }
                else if (currentScreen === "MODES") { if (act === "UP") modesMenuSelection = (modesMenuSelection <= 0) ? 4 : modesMenuSelection - 1; if (act === "DOWN") modesMenuSelection = (modesMenuSelection >= 4) ? 0 : modesMenuSelection + 1; }
                else if (currentScreen === "SETTINGS") { let max = 5; if (act === "UP") settingsMenuSelection = (settingsMenuSelection <= 0) ? max : settingsMenuSelection - 1; if (act === "DOWN") settingsMenuSelection = (settingsMenuSelection >= max) ? 0 : settingsMenuSelection + 1; }
                else if (currentScreen === "TASKS") { if (act === "UP") tasksScrollY = Math.max(0, tasksScrollY - 20); if (act === "DOWN") tasksScrollY = Math.min(maxTasksScrollY, tasksScrollY + 20); }
                else if (currentScreen === "ABOUT") { if (act === "UP") aboutScrollY = Math.max(0, aboutScrollY - 15); if (act === "DOWN") aboutScrollY = Math.min(maxAboutScrollY, aboutScrollY + 15); }
            }
        }

        document.getElementById("btn-up").onclick = () => { triggerVibration(); handleInput("UP"); };
        document.getElementById("btn-down").onclick = () => { triggerVibration(); handleInput("DOWN"); };
        document.getElementById("btn-left").onclick = () => { triggerVibration(); handleInput("LEFT"); };
        document.getElementById("btn-right").onclick = () => { triggerVibration(); handleInput("RIGHT"); };
        btnMenuEl.onclick = () => { triggerVibration(); handleMenuPress(); };
        btnBackEl.onclick = () => { triggerVibration(); handleBackPress(); };
        btnSpaceEl.onclick = () => { triggerVibration(); handleCenter(); };
        
        window.addEventListener("keydown", (e) => {
            if (document.activeElement === nameInput) return; 
            const mapping = { "ArrowUp": "UP", "KeyW": "UP", "ArrowDown": "DOWN", "KeyS": "DOWN", "ArrowLeft": "LEFT", "KeyA": "LEFT", "ArrowRight": "RIGHT", "KeyD": "RIGHT", "Space": "CENTER", "Enter": "CENTER", "Escape": "BACK", "Backspace": "BACK", "KeyM": "MENU" };
            const action = mapping[e.code];
            if (!action) return;
            e.preventDefault(); 
            if (action === "CENTER") handleCenter(); else if (action === "BACK") handleBackPress(); else if (action === "MENU") handleMenuPress(); else handleInput(action);
        });

        loadAboutText(); generateObstacles(); loadBestSingleScore(); updateTicker(); updateHUD();
    </script>
</body>
</html>
