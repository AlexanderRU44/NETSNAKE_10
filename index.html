                }
            }
        };

        let currentScreen = "MAIN", mainMenuSelection = 0, settingsMenuSelection = 0, modesMenuSelection = 0;
        let tasksScrollY = 0; 
        const maxTasksScrollY = 210; 
        let gameInterval = null;
        let audioCtx = null;
        let globalTopTen = []; 
        let isLoadingLeaderboard = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function triggerVibration() {
            if (navigator.vibrate) {
                navigator.vibrate(5);
            }
        }

        function completeTask(id) {
            if (!tasks[id]) {
                tasks[id] = true;
                playSound("taskComplete");
                spawnGift();
            }
        }

        function generateObstacles() {
            obstacles = [];
            if (currentModeIdx !== 1) return; // Стены генерируются только для режима СТЕНЫ (теперь индекс 1)
            
            while (obstacles.length < 8) {
                let obsX = Math.floor(Math.random() * tileCount);
                let obsY = Math.floor(Math.random() * tileCount);
                
                let distance = Math.abs(obsX - 10) + Math.abs(obsY - 10);
                if (distance > 3) {
                    if (!obstacles.some(o => o.x === obsX && o.y === obsY)) {
                        obstacles.push({x: obsX, y: obsY});
                    }
                }
            }
        }

        function spawnGift() {
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(part => part.x === x && part.y === y) || 
                                     obstacles.some(o => o.x === x && o.y === y) ||
                                     ghostTrails.some(g => g.x === x && g.y === y) ||
                                     (food.x === x && food.y === y) || 
                                     (gift && gift.x === x && gift.y === y);
                    if (!isOccupied) validPositions.push({x, y});
                }
            }
            if (validPositions.length > 0) {
                gift = validPositions[Math.floor(Math.random() * validPositions.length)];
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === "eat") {
                osc.type = "square";
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === "bigEat") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === "shrinkEat") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === "giftEat") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.07);
                osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.14);
                osc.frequency.setValueAtTime(1046, audioCtx.currentTime + 0.21);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === "die") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === "taskComplete") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }
        }

        async function sendScoreToFirebase(finalScore) {
            if (isGameSubmitting || finalScore <= 0) return;
            if (usedAIThisSession) return;
            
            isGameSubmitting = true;
            try {
                await addDoc(collection(db, "global_leaderboard"), {
                    playerName: playerName,
                    score: Number(finalScore),
                    timestamp: new Date()
                });
                await loadBestSingleScore(); 
            } catch (e) { console.error("Error saving score: ", e); }
            finally { isGameSubmitting = false; }
        }

        async function loadBestSingleScore() {
            try {
                const q = query(collection(db, "global_leaderboard"), orderBy("score", "desc"), limit(1));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const bestDoc = querySnapshot.docs[0].data();
                    hiScore = bestDoc.score;
                    bestPlayerName = bestDoc.playerName;
                    localStorage.setItem("snake_hi_score_v11", hiScore);
                    localStorage.setItem("snake_best_player", bestPlayerName);
                    updateHUD();
                }
            } catch (e) { console.error(e); }
        }

        async function loadTopTen() {
            isLoadingLeaderboard = true;
            try {
                const q = query(collection(db, "global_leaderboard"), orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                globalTopTen = [];
                querySnapshot.forEach((doc) => {
                    globalTopTen.push(doc.data());
                });
            } catch (e) { console.error(e); }
            isLoadingLeaderboard = false;
        }

        function updateHUD() {

            const modeTag = ` [${t.gameModes[currentModeIdx]}]`;

            } else {
                hiScoreElement.innerText = `${t.hi}:${hiScore} ${t.bestBy} ${bestPlayerName}`;
            }
            updateButtonLabels();

        function makeAIMove() {
            const head = snake[0];
            const queue = [ [head.x, head.y, []] ];
            const visited = Array.from({ length: tileCount }, () => Array(tileCount).fill(false));
            visited[head.x][head.y] = true;

            for (let i = 0; i < snake.length - 1; i++) {
                visited[snake[i].x][snake[i].y] = true;
            }
            obstacles.forEach(o => visited[o.x][o.y] = true);
            ghostTrails.forEach(g => visited[g.x][g.y] = true);

            const directions = [
                { x: 0, y: -1, name: "UP" },
                { x: 0, y: 1, name: "DOWN" },
                { x: -1, y: 0, name: "LEFT" },
                { x: 1, y: 0, name: "RIGHT" }
            ];

            let pathToTarget = null;
            let targetX = gift ? gift.x : food.x;
            let targetY = gift ? gift.y : food.y;

            while (queue.length > 0) {
                const [cx, cy, path] = queue.shift();

                if (cx === targetX && cy === targetY) {
                    pathToTarget = path;
                    break;
                }

                for (const d of directions) {
                    let nx = cx + d.x;
                    let ny = cy + d.y;

                    // В режиме ПРЕПЯТСТВИЕ (теперь индекс 2) стены смертельны. В остальных (0, 1, 3) — сквозные
                    if (currentModeIdx !== 2) {
                        if (nx < 0) nx = tileCount - 1; if (nx >= tileCount) nx = 0;
                        if (ny < 0) ny = tileCount - 1; if (ny >= tileCount) ny = 0;
                    } else {
                        if (nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount) continue;
                    }

                    if (!visited[nx][ny]) {
                        visited[nx][ny] = true;
                        queue.push([nx, ny, [...path, d.name]]);
                    }
                }
            }

            let nextMove = null;
            if (pathToTarget && pathToTarget.length > 0) {
                nextMove = pathToTarget[0];
            } else {
                for (const d of directions) {
                    if (snake.length > 1 && ((d.name === "UP" && dy === 1) || (d.name === "DOWN" && dy === -1) || (d.name === "LEFT" && dx === 1) || (d.name === "RIGHT" && dx === -1))) continue;

                    let nx = head.x + d.x;
                    let ny = head.y + d.y;

                    if (currentModeIdx !== 2) {
                        if (nx < 0) nx = tileCount - 1; if (nx >= tileCount) nx = 0;
                        if (ny < 0) ny = tileCount - 1; if (ny >= tileCount) nx = 0;
                    } else {
                        if (nx < 0 || nx >= tileCount || ny < 0 || ny >= tileCount) continue;
                    }

                    let hitsSelf = false;
                    for (let i = 0; i < snake.length - 1; i++) {
                        if (snake[i].x === nx && snake[i].y === ny) hitsSelf = true;
                    }
                    if (obstacles.some(o => o.x === nx && o.y === ny)) hitsSelf = true;
                    if (ghostTrails.some(g => g.x === nx && g.y === ny)) hitsSelf = true;

                    if (!hitsSelf) {
                        nextMove = d.name;
                        break;
                    }
                }
            }

            if (nextMove) {
                if (nextMove === "UP") { nextDx = 0; nextDy = -1; }
                if (nextMove === "DOWN") { nextDx = 0; nextDy = 1; }
                if (nextMove === "LEFT") { nextDx = -1; nextDy = 0; }
                if (nextMove === "RIGHT") { nextDx = 1; nextDy = 0; }
            }
        }

        function gameLoop() {
            clearCanvas();
            const t = i18n[currentLang];
            flashCounter++; if (flashCounter % 3 === 0) flashToggle = !flashToggle;

            if (isPaused) { 
                timerContainer.style.visibility = "hidden";
                drawObstacles();
                drawGhostTrails();
                drawSnake(); drawFood(); drawGift();
                
                if (currentScreen === "MAIN") {
                    if (gameOver) drawPixelMenu(t.gameOver);
                    else drawPixelMenu(t.pause);
                }
                else if (currentScreen === "SETTINGS") drawPixelMenu(t.settings);
                else if (currentScreen === "MODES") drawModesScreen();
                else if (currentScreen === "LEADERBOARD") drawLeaderboardScreen();
                else if (currentScreen === "TASKS") drawTasksScreen();
                return; 
            }

            if (foodType !== "REGULAR") {
                bonusTimer -= speeds[currentSpeedMode];
                timerContainer.style.visibility = "visible";
                
                const maxTime = (foodType === "BIG") ? maxBigFoodTime : maxShrinkTime;
                const percentage = Math.max(0, (bonusTimer / maxTime) * 100);
                timerBar.style.width = percentage + "%";
                
                if (bonusTimer <= 0) { 
                    foodType = "REGULAR"; 
                    timerContainer.style.visibility = "hidden";
                    generateFood(); 
                }
            } else {
                timerContainer.style.visibility = "hidden";
            }

            if (aiMode) makeAIMove();

            dx = nextDx;
            dy = nextDy;

            moveSnake();
            if (!gameOver) { 
                checkCollision(); 
                drawObstacles();
                drawGhostTrails();
                drawFood(); 
                drawGift(); 
                drawSnake(); 
            }
        }

        function updateTicker() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, speeds[currentSpeedMode]);
        }

        function clearCanvas() {
            ctx.fillStyle = "#9bbc0f"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(15, 56, 15, 0.05)";
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath(); ctx.moveTo(i*20,0); ctx.lineTo(i*20,400); ctx.moveTo(0,i*20); ctx.lineTo(400,i*20); ctx.stroke();
            }
        }

        function drawObstacles() {
            if (currentModeIdx !== 1) return; // Стены отрисовываются только для режима СТЕНЫ (индекс 1)
            ctx.fillStyle = "#0f380f";
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x * 20 + 2, obs.y * 20 + 2, 16, 16);
                ctx.strokeStyle = "#9bbc0f";
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x * 20 + 5, obs.y * 20 + 5, 10, 10);
            });
        }

        function drawGhostTrails() {
            if (currentModeIdx !== 3) return; 
            ghostTrails.forEach(gt => {
                ctx.fillStyle = flashToggle ? "rgba(15, 56, 15, 0.6)" : "rgba(15, 56, 15, 0.3)";
                ctx.fillRect(gt.x * 20 + 4, gt.y * 20 + 4, 12, 12);
            });
        }

        function drawSnake() {
            const activeColor = snakeColors[currentSnakeColorIdx];
            snake.forEach((part, i) => {
                ctx.fillStyle = activeColor.hex; 
                ctx.fillRect(part.x * 20 + 1, part.y * 20 + 1, 18, 18);
                if (i === 0) { 
                    ctx.fillStyle = activeColor.eyeHex; 
                    ctx.fillRect(part.x * 20 + 4, part.y * 20 + 4, 4, 4); 
                }
            });
        }

        function drawFood() {
            if (foodType !== "REGULAR" && !flashToggle) return; 
            
            const px = food.x * 20;
            const py = food.y * 20;

            if (foodType === "REGULAR") {
                ctx.fillStyle = "#ff0033"; 
                ctx.fillRect(px + 5, py + 4, 10, 12);
                ctx.fillRect(px + 4, py + 6, 12, 8);
                ctx.fillRect(px + 6, py + 3, 8, 1);
                ctx.fillRect(px + 6, py + 16, 8, 1);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 13, 2, 2);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 6, 2, 2); ctx.fillRect(px + 8, py + 6, 1, 1);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 1, 1, 2);
                ctx.fillStyle = "#4e8a10"; ctx.fillRect(px + 10, py + 1, 2, 1);
                
            } else if (foodType === "BIG") {
                ctx.fillStyle = "#ffd700"; 
                ctx.fillRect(px + 5, py + 4, 10, 12);
                ctx.fillRect(px + 4, py + 6, 12, 8);
                ctx.fillRect(px + 6, py + 3, 8, 1);
                ctx.fillRect(px + 6, py + 16, 8, 1);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 13, 2, 2);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 6, 2, 2); ctx.fillRect(px + 8, py + 6, 1, 1);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 1, 1, 2);
                ctx.fillStyle = "#2d520a"; ctx.fillRect(px + 10, py + 1, 2, 1);

            } else if (foodType === "SHRINK") {
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 8, py + 2, 4, 1); 
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 3, 2, 3); 
                ctx.fillStyle = "#1e88e5"; 
                ctx.fillRect(px + 5, py + 7, 10, 10); ctx.fillRect(px + 4, py + 9, 12, 6); ctx.fillRect(px + 6, py + 6, 8, 1);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 5, py + 8, 10, 1); ctx.fillRect(px + 11, py + 11, 2, 2);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 10, 2, 3); ctx.fillRect(px + 8, py + 10, 1, 1);
            }
        }

        function drawGift() {
            if (!gift) return;

            const px = gift.x * 20;
            const py = gift.y * 20;

            ctx.fillStyle = "#ff0033";
            ctx.fillRect(px + 3, py + 7, 14, 11); ctx.fillRect(px + 2, py + 5, 16, 3);
            ctx.fillStyle = "#0f380f";
            ctx.fillRect(px + 9, py + 5, 2, 13); ctx.fillRect(px + 3, py + 11, 14, 2);

            ctx.fillStyle = "#ff0033";
            if (flashToggle) {
                ctx.fillRect(px + 6, py + 2, 3, 3); ctx.fillRect(px + 11, py + 2, 3, 3);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 3, 2, 2);
            } else {
                ctx.fillRect(px + 5, py + 3, 3, 2); ctx.fillRect(px + 12, py + 3, 3, 2);
                ctx.fillStyle = "#0f380f"; ctx.fillRect(px + 9, py + 4, 2, 1);
            }
        }

        function drawPixelMenu(title) {
            const t = i18n[currentLang];
            ctx.fillStyle = "#0f380f"; ctx.fillRect(20, 25, 360, 350);
            ctx.strokeStyle = "#9bbc0f"; ctx.lineWidth = 2; ctx.strokeRect(26, 31, 348, 338);
            ctx.fillStyle = "#9bbc0f"; ctx.font = "15px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(title, 200, 65);
            ctx.fillRect(40, 85, 320, 2);

            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            if (currentScreen === "MAIN") {
                let options = [];
                let positions = [];
                
                if (gameOver) {
                    options = [t.newGame, t.modesMenu, t.settings, t.records, t.tasksMenu];
                    positions = [120, 165, 210, 255, 300];
                } else {
                    options = [t.continue, t.newGame, t.modesMenu, t.settings, t.records, t.tasksMenu];
                    positions = [115, 155, 195, 235, 275, 315];
                }
                
                options.forEach((opt, idx) => {
                    ctx.fillText(mainMenuSelection === idx ? ">" : " ", 40, positions[idx]);
                    ctx.fillText(opt, 75, positions[idx]);
                });
            } else if (currentScreen === "SETTINGS") {
                let snakeColorName = (currentLang === "RU") ? snakeColors[currentSnakeColorIdx].nameRU : snakeColors[currentSnakeColorIdx].nameEN;
                let items = [
                    `${t.speed}:${t.speedModes[currentSpeedMode]}`,
                    `${t.sound}:${soundEnabled ? t.toggleModes[1] : t.toggleModes[0]}`,
                    `${t.lang}:${currentLang}`,
                    `${t.name}:${playerName}`,
                    `${t.snakeColor}:${snakeColorName}`
                ];
                items.forEach((txt, i) => {
                    let y = 120 + (i * 36);
                    if (settingsMenuSelection === i) ctx.fillText(">", 35, y);
                    ctx.fillText(txt, 65, y);
                });
            }
        }

        function drawModesScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = "#0f380f"; ctx.fillRect(20, 25, 360, 350);
            ctx.strokeStyle = "#9bbc0f"; ctx.lineWidth = 2; ctx.strokeRect(26, 31, 348, 338);
            ctx.fillStyle = "#9bbc0f"; ctx.font = "15px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.modesTitle, 200, 65);
            ctx.fillRect(40, 85, 320, 2);

            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            t.gameModes.forEach((modeName, idx) => {
                let y = 130 + (idx * 40);
                let pointer = (modesMenuSelection === idx) ? ">" : " ";
                let activeCheckbox = (currentModeIdx === idx) ? "[X]" : "[ ]";
                ctx.fillText(`${pointer} ${activeCheckbox} ${modeName}`, 50, y);
            });

            ctx.fillStyle = "#9bbc0f"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; 
            ctx.fillText(t.back, 200, 340);
        }

        function drawLeaderboardScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = "#0f380f"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#9bbc0f"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#9bbc0f"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.globalTop, 200, 48);
            ctx.fillRect(40, 58, 320, 2);

            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            if (isLoadingLeaderboard) {
                ctx.textAlign = "center";
                ctx.fillText(t.loading, 200, 200);
            } else {
                if (globalTopTen.length === 0) {
                    ctx.textAlign = "center";
                    ctx.fillText(t.empty, 200, 200);
                } else {
                    globalTopTen.forEach((entry, idx) => {
                        let y = 88 + (idx * 26);
                        let num = String(idx + 1).padStart(2, '0');
                        let rawName = (entry.playerName || "ANON").substring(0, 8);
                        let pScore = entry.score;
                        
                        ctx.fillText(`${num}.${rawName}`, 40, y);
                        
                        let medal = "";
                        if (idx === 0) medal = "🥇";
                        if (idx === 1) medal = "🥈";
                        if (idx === 2) medal = "🥉";
                        
                        if (medal !== "") {
                            ctx.font = "14px Arial";
                            let nameWidth = rawName.length * 11; 
                            ctx.fillText(medal, 40 + 35 + nameWidth + 5, y + 2);
                            ctx.font = "11px 'Press Start 2P'";
                        }
                        ctx.fillText(`:${pScore}`, 275, y);
                    });
                }
            }
            ctx.fillStyle = "#9bbc0f"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; 
            ctx.fillText(t.back, 200, 360);
        }

        function drawTasksScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = "#0f380f"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#9bbc0f"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#9bbc0f"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.tasksTitle, 200, 45);
            ctx.fillRect(40, 54, 320, 2);

            ctx.save();
            ctx.beginPath();
            ctx.rect(30, 60, 340, 265);
            ctx.clip();

            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            const taskKeys = ["score50", "score100", "score500", "score1000", "goldFood", "blueFood", "cyborg", "fullField"];
            
            taskKeys.forEach((key, idx) => {
                let y = 85 + (idx * 52) - tasksScrollY; 
                let isDone = tasks[key];
                let check = isDone ? "[X]" : "[ ]";
                
                ctx.fillStyle = isDone ? "#9bbc0f" : "#445808";
                let isSecret = (key === "cyborg" || key === "fullField");
                
                if (isSecret && !isDone) {
                    ctx.fillText(`${check} ${t.unknownTask}`, 42, y);
                } else {
                    ctx.fillText(`${check} ${t.taskList[key]}`, 42, y);
                }
                
                ctx.font = "7.5px 'Press Start 2P'"; 
                ctx.fillStyle = isDone ? "#9bbc0f" : "#8bac0f"; 
                
                if (isSecret && !isDone) {
                    ctx.fillText(t.secretTaskDesc, 42, y + 15);
                } else {
                    ctx.fillText(t.taskList[key + "Desc"], 42, y + 15);
                }
                ctx.font = "11px 'Press Start 2P'";
            });

            ctx.restore();

            ctx.fillStyle = "#223d0a";
            ctx.fillRect(355, 65, 4, 255); 
            ctx.fillStyle = "#9bbc0f";
            let scrollBarHeight = 90;
            let scrollBarY = 65 + (tasksScrollY / maxTasksScrollY) * (255 - scrollBarHeight);
            ctx.fillRect(355, scrollBarY, 4, scrollBarHeight); 

            ctx.fillStyle = "#9bbc0f"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; 
            ctx.fillText(t.back, 200, 365);
        }

        function openNameInput() {
            const t = i18n[currentLang];
            overlayLabel.innerText = t.enterName;
            btnSaveName.innerText = t.saveBtn; 
            nameInput.value = playerName;
            nameOverlay.style.display = "flex";
            currentScreen = "EDIT_NAME";
            setTimeout(() => nameInput.focus(), 50); 
        }

        function saveNameInput() {
            let val = nameInput.value.trim().toUpperCase();
            if (val === "") val = "PLAYER";
            playerName = val.substring(0, 8);
            localStorage.setItem("snake_player_name", playerName);
            nameOverlay.style.display = "none";
            currentScreen = "SETTINGS";
            updateHUD();
        }

        btnSaveName.onclick = (e) => { 
            e.preventDefault(); 
            triggerVibration(); 
            saveNameInput(); 
        };
        nameInput.onkeydown = (e) => {
            if (e.key === "Enter") { e.preventDefault(); saveNameInput(); }
        };

        function moveSnake() {
            let h = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // В режиме ПРЕПЯТСТВИЕ (индекс 2) змейка не проходит сквозь границы экрана, а умирает
            if (currentModeIdx !== 2 || aiMode) {
                if (h.x < 0) h.x = 19; if (h.x > 19) h.x = 0;
                if (h.y < 0) h.y = 19; if (h.y > 19) h.y = 0;
            }
            
            if (currentModeIdx === 3 && snake.length > 0) { 
                ghostTrails.push({ x: snake[snake.length - 1].x, y: snake[snake.length - 1].y, ttl: 25 });
            }

            ghostTrails.forEach(gt => gt.ttl--);
            ghostTrails = ghostTrails.filter(gt => gt.ttl > 0);

            snake.unshift(h);
            
            if (gift && h.x === gift.x && h.y === gift.y) {
                playSound("giftEat");
                score += 50;
                gift = null;
                checkScoreTasks();
                updateHUD();
            }

            if (h.x === food.x && h.y === food.y) {
                if (foodType === "REGULAR") { 
                    playSound("eat"); 
                    score += 1; 
                } else if (foodType === "BIG") { 
                    playSound("bigEat"); 
                    score += 10; 
                    goldFoodEaten = true; 
                    completeTask("goldFood");
                } else if (foodType === "SHRINK") {
                    playSound("shrinkEat");
                    blueFoodEaten = true; 
                    completeTask("blueFood");
                    let newLength = Math.max(1, Math.floor(snake.length / 2));
                    while (snake.length > newLength) { snake.pop(); }
                }
                
                checkScoreTasks();
                foodType = "REGULAR"; timerContainer.style.visibility = "hidden";
                updateHUD(); generateFood();
            } else {
                snake.pop();
            }

            if (snake.length >= 400) {
                completeTask("fullField");
            }
        }

        function checkScoreTasks() {
            if (score >= 50) completeTask("score50");
            if (score >= 100) completeTask("score100");
            if (score >= 500) completeTask("score500");
            if (score >= 1000) completeTask("score1000");
        }

        function generateFood() {
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(part => part.x === x && part.y === y) || 
                                     obstacles.some(o => o.x === x && o.y === y) ||
                                     ghostTrails.some(g => g.x === x && g.y === y) ||
                                     (gift && gift.x === x && gift.y === y);
                    if (!isOccupied) validPositions.push({x, y});
                }
            }

            if (validPositions.length === 0) {
                completeTask("fullField");
                if (!aiMode) endGame(); 
                return;
            }

            food = validPositions[Math.floor(Math.random() * validPositions.length)];

            let rand = Math.random();
            if (rand < 0.05 && !blueFoodEaten) { 
                foodType = "SHRINK"; 
                bonusTimer = maxShrinkTime; 
            } else if (rand < 0.15 && !goldFoodEaten) { 
                foodType = "BIG"; 
                bonusTimer = maxBigFoodTime; 
            } else { 
                foodType = "REGULAR"; 
            }
        }

        function checkCollision() {
            if (aiMode) return; 
            
            let h = snake[0];
            
            // В режиме ПРЕПЯТСТВИЕ (индекс 2) добавляется смерть об внешние границы экрана
            if (currentModeIdx === 2) {
                if (h.x < 0 || h.x > 19 || h.y < 0 || h.y > 19) { endGame(); return; }
            }
            
            for(let i=1; i<snake.length; i++) if(h.x===snake[i].x && h.y===snake[i].y) endGame();
            
            // Столкновение со статичными блоками только в режиме СТЕНЫ (индекс 1)
            if (currentModeIdx === 1 && obstacles.some(obs => obs.x === h.x && obs.y === h.y)) endGame();

            if (ghostTrails.some(gt => gt.x === h.x && gt.y === h.y)) endGame();
        }

        function endGame() {
            playSound("die");
            gameOver = true; 
            isPaused = true; 
            currentScreen = "MAIN"; 
            mainMenuSelection = 0;
            updateHUD();
            sendScoreToFirebase(score); 
        }

        function handleMenuPress() {
            initAudio();
            if (currentScreen === "EDIT_NAME") return;
            if (!isPaused) isPaused = true;
            currentScreen = "MAIN";
        }

        function handleBackPress() {
            initAudio();
            if (currentScreen === "EDIT_NAME") return;
            if (currentScreen === "SETTINGS" || currentScreen === "LEADERBOARD" || currentScreen === "TASKS" || currentScreen === "MODES") {
                currentScreen = "MAIN";
            }
        }

        async function handleCenter() {
            initAudio();

            if (currentScreen === "EDIT_NAME") {
                saveNameInput();
                return;
            }

            if (!isPaused && !gameOver && cheatSequence.length === 3 && cheatSequence.every((val, i) => val === targetCheat[i])) {
                aiMode = !aiMode; 
                if (aiMode) {
                    usedAIThisSession = true; 
                    completeTask("cyborg");
                }
                updateHUD(); cheatSequence = []; return; 
            }
            cheatSequence = []; 

            if (currentScreen === "MAIN") {
                if (gameOver) {
                    if (mainMenuSelection === 0) { reset(); } 
                    else if (mainMenuSelection === 1) { currentScreen = "MODES"; modesMenuSelection = currentModeIdx; }
                    else if (mainMenuSelection === 2) { currentScreen = "SETTINGS"; settingsMenuSelection = 0; }
                    else if (mainMenuSelection === 3) { currentScreen = "LEADERBOARD"; loadTopTen(); }
                    else if (mainMenuSelection === 4) { currentScreen = "TASKS"; tasksScrollY = 0; }
                } else {
                    if (mainMenuSelection === 0) { isPaused = false; } 
                    else if (mainMenuSelection === 1) { reset(); } 
                    else if (mainMenuSelection === 2) { currentScreen = "MODES"; modesMenuSelection = currentModeIdx; }
                    else if (mainMenuSelection === 3) { currentScreen = "SETTINGS"; settingsMenuSelection = 0; }
                    else if (mainMenuSelection === 4) { currentScreen = "LEADERBOARD"; loadTopTen(); }
                    else if (mainMenuSelection === 5) { currentScreen = "TASKS"; tasksScrollY = 0; }
                }
                return;
            }

            if (currentScreen === "MODES") {
                currentModeIdx = modesMenuSelection;
                updateHUD();
                reset(); 
                return;
            }

            if (currentScreen === "SETTINGS") {
                let s = settingsMenuSelection;
                if (s === 0) { 
                    currentSpeedMode = (currentSpeedMode + 1) % 3; 
                    updateTicker(); 
                }
                else if (s === 1) { soundEnabled = !soundEnabled; localStorage.setItem("snake_sound_enabled", soundEnabled); }
                else if (s === 2) { currentLang = (currentLang === "RU") ? "EN" : "RU"; updateHUD(); }
                else if (s === 3) { openNameInput(); }
                else if (s === 4) { 
                    currentSnakeColorIdx = (currentSnakeColorIdx + 1) % snakeColors.length;
                    localStorage.setItem("snake_color_idx", currentSnakeColorIdx);
                }
                return;
            }

            if (currentScreen === "LEADERBOARD" || currentScreen === "TASKS") {
                return;
            }

            if (!isPaused) { 
                isPaused = true; 
                return; 
            }
        }

        function reset() {
            tasks = {
                score50: false, score100: false, score500: false, score1000: false,
                goldFood: false, blueFood: false, cyborg: false, fullField: false
            };
            gift = null; goldFoodEaten = false; blueFoodEaten = false;
            snake = [{x: 10, y: 10}]; 
            ghostTrails = [];
            generateObstacles(); 
            
            dx = 1; dy = 0; nextDx = 1; nextDy = 0; 
            score = 0; gameOver = false; isPaused = false; foodType = "REGULAR";
            aiMode = false; usedAIThisSession = false; 
            mainMenuSelection = 0;
            timerContainer.style.visibility = "hidden"; generateFood(); updateHUD(); cheatSequence = [];
        }

        function handleInput(act) {
            if (currentScreen === "EDIT_NAME") return; 
            initAudio();
            if (!isPaused) {
                cheatSequence.push(act); if (cheatSequence.length > 3) cheatSequence.shift(); 
                if (aiMode) return; 
                
                if (act === "UP" && dy === 0) { nextDx = 0; nextDy = -1; }
                if (act === "DOWN" && dy === 0) { nextDx = 0; nextDy = 1; }
                if (act === "LEFT" && dx === 0) { nextDx = -1; nextDy = 0; }
                if (act === "RIGHT" && dx === 0) { nextDx = 1; nextDy = 0; }
            } else {
                if (currentScreen === "MAIN") {
                    let maxSel = gameOver ? 4 : 5;
                    if (act === "UP") mainMenuSelection = (mainMenuSelection <= 0) ? maxSel : mainMenuSelection - 1;
                    if (act === "DOWN") mainMenuSelection = (mainMenuSelection >= maxSel) ? 0 : mainMenuSelection + 1;
                } else if (currentScreen === "MODES") {
                    if (act === "UP") modesMenuSelection = (modesMenuSelection <= 0) ? 3 : modesMenuSelection - 1;
                    if (act === "DOWN") modesMenuSelection = (modesMenuSelection >= 3) ? 0 : modesMenuSelection + 1;
                } else if (currentScreen === "SETTINGS") {
                    if (act === "UP") settingsMenuSelection = (settingsMenuSelection <= 0) ? 4 : settingsMenuSelection - 1;
                    if (act === "DOWN") settingsMenuSelection = (settingsMenuSelection >= 4) ? 0 : settingsMenuSelection + 1;
                } else if (currentScreen === "TASKS") {
                    if (act === "UP") tasksScrollY = Math.max(0, tasksScrollY - 20);
                    if (act === "DOWN") tasksScrollY = Math.min(maxTasksScrollY, tasksScrollY + 20);
                }
            }
        }

        // Клики по кнопкам экранного D-Pad
        document.getElementById("btn-up").onclick = () => { triggerVibration(); handleInput("UP"); };
        document.getElementById("btn-down").onclick = () => { triggerVibration(); handleInput("DOWN"); };
        document.getElementById("btn-left").onclick = () => { triggerVibration(); handleInput("LEFT"); };
        document.getElementById("btn-right").onclick = () => { triggerVibration(); handleInput("RIGHT"); };
        
        btnMenuEl.onclick = () => { triggerVibration(); handleMenuPress(); };
        btnBackEl.onclick = () => { triggerVibration(); handleBackPress(); };
        btnSpaceEl.onclick = () => { triggerVibration(); handleCenter(); };

        // Слушатель для клавиатуры ПК
        window.addEventListener("keydown", (e) => {
            if (currentScreen === "EDIT_NAME") return;

            const mapping = {
                "ArrowUp": "UP", "KeyW": "UP",
                "ArrowDown": "DOWN", "KeyS": "DOWN",
                "ArrowLeft": "LEFT", "KeyA": "LEFT",
                "ArrowRight": "RIGHT", "KeyD": "RIGHT",
                "Space": "CENTER", "Enter": "CENTER",
                "Escape": "BACK", "Backspace": "BACK",
                "KeyM": "MENU"
            };

            const action = mapping[e.code];
            if (!action) return;

            e.preventDefault(); 

            if (action === "CENTER") handleCenter();
            else if (action === "BACK") handleBackPress();
            else if (action === "MENU") handleMenuPress();
            else handleInput(action);
        });

        // Инициализация при старте
        generateObstacles();
        loadBestSingleScore();
        updateTicker();
        updateHUD();
    </script>
</body>
</html>
