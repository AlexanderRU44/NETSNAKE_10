<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NetSnake 10</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: 'Press Start 2P', monospace;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            min-height: -webkit-fill-available; /* Фикс для мобильного Safari */
            margin: 0; 
            padding: 10px; 
            overflow: hidden;
            touch-action: none; 
            overscroll-behavior: none;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 { 
            margin: 0 0 10px 0; 
            font-size: 1.1rem; 
            text-align: center; 
            transition: color 0.3s, text-shadow 0.3s; 
        }
        
        /* Главный контейнер телефона */
        .phone-wrapper {
            padding: 15px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 410px; 
            max-height: 92vh; /* Не дает телефону вылезать за рамки экрана по высоте */
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            position: relative;
            transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        /* Темы оформления */
        body.light-theme { background-color: #f0f2f5; color: #333; }
        body.light-theme h1 { color: #222; text-shadow: 0 0 5px rgba(0, 0, 0, 0.1); }
        body.light-theme .phone-wrapper {
            background: #e1e4e9; border: 4px solid #ccd1d9; 
            box-shadow: inset 0 0 10px #fff, 0 10px 25px rgba(0,0,0,0.1);
        }
        body.light-theme .screen { background-color: #f7f9fa; border: 8px solid #2b3a4a; box-shadow: inset 0 0 15px rgba(0,0,0,0.05); }
        body.light-theme .hud { border-bottom: 2px solid #2b3a4a; color: #2b3a4a; }
        body.light-theme canvas { background-color: #ffffff; }
        body.light-theme .timer-bar-container { background: #f7f9fa; border: 2px solid #2b3a4a; }
        body.light-theme .timer-bar { background: #2b3a4a; }
        body.light-theme .btn-dir { background: #b0b7c0; border: 3px solid #8e96a0; color: #ffffff; box-shadow: 0 4px #9aa1a9, inset 0 2px rgba(255,255,255,0.4); }
        body.light-theme .btn-dir:active { box-shadow: 0 1px #9aa1a9; }

        body.dark-theme { background-color: #1a1c1e; color: #eee; }
        body.dark-theme h1 { color: #8bac0f; text-shadow: 0 0 5px rgba(139, 172, 15, 0.4); }
        body.dark-theme .phone-wrapper {
            background: #2d3033; border: 4px solid #1f2124; 
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05), 0 10px 25px rgba(0,0,0,0.4);
        }
        body.dark-theme .screen { background-color: #0f141c; border: 8px solid #0d1117; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); }
        body.dark-theme .hud { border-bottom: 2px solid #30363d; color: #8b949e; }
        body.dark-theme canvas { background-color: #0d1117; }
        body.dark-theme .timer-bar-container { background: #0f141c; border: 2px solid #30363d; }
        body.dark-theme .timer-bar { background: #58a6ff; }
        body.dark-theme .btn-dir { background: #3a3d42; border: 3px solid #282a2d; color: #eeeeee; box-shadow: 0 4px #1c1d1f, inset 0 2px rgba(255,255,255,0.05); }
        body.dark-theme .btn-dir:active { box-shadow: 0 1px #1c1d1f; }

        .screen { padding: 8px; position: relative; }
        .hud { display: flex; justify-content: space-between; font-size: 0.65rem; padding-bottom: 8px; margin-bottom: 8px; visibility: hidden; }
        canvas { display: block; width: 100%; height: auto; aspect-ratio: 1 / 1; }
        
        .timer-bar-container { width: 100%; height: 10px; margin-top: 5px; visibility: hidden; }
        .timer-bar { height: 100%; width: 100%; transition: width 0.1s linear; }

        /* Оверлей ввода имени */
        .name-input-overlay {
            position: absolute; top: 25%; left: 20px; right: 20px;
            background: #2b3a4a; padding: 15px; border: 3px solid #ffffff;
            display: none; flex-direction: column; align-items: center; gap: 12px; z-index: 10;
        }
        .name-input-overlay label { color: #ffffff; font-size: 11px; text-align: center; line-height: 1.4; }
        .name-input-overlay input {
            background: #ffffff; color: #2b3a4a; border: none; padding: 8px;
            font-family: inherit; font-size: 14px; text-align: center; width: 100%;
            outline: none; text-transform: uppercase;
            -webkit-user-select: text; user-select: text; /* Разрешаем ввод текста */
        }
        .name-input-overlay button {
            background: #ffffff; color: #2b3a4a; border: none; padding: 8px 15px;
            font-family: inherit; font-size: 10px; cursor: pointer; width: 100%;
        }

        /* Контейнер кнопок (D-Pad) */
        .dpad-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(3, auto);
            gap: 8px; 
            width: 100%; 
            max-width: 340px; 
            margin: 5px auto 0 auto; 
        }
        
        .btn {
            font-family: inherit; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.05s ease;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.2);
            touch-action: manipulation;
            width: 100%;
        }
        .btn:active { transform: translateY(2px); }
        
        /* Слегка уменьшил базовую высоту кнопок для надежности на мелких экранах */
        .btn-dir { height: 55px; font-size: 1.2rem; border-radius: 12px; }
        
        .btn-center { 
            height: 55px; border-radius: 12px; font-size: 0.8rem; 
            background: #4a90e2; border: 3px solid #2d6ca8; color: #fff; box-shadow: 0 4px #224d7a, inset 0 2px rgba(255,255,255,0.3);
        }
        .btn-center:active { box-shadow: 0 1px #224d7a; }
        
        .btn-side { 
            height: 42px; 
            font-size: 0.6rem; 
            border-radius: 8px; 
            color: #fff; 
            align-self: end; 
            margin-bottom: 2px;
        }
        
        #btn-menu { background: #ff5c5c; border: 3px solid #d14141; box-shadow: 0 4px #9e2b2b; grid-column: 1; grid-row: 1; }
        #btn-menu:active { box-shadow: 0 1px #9e2b2b; }
        
        #btn-back { background: #7ed321; border: 3px solid #5fa315; box-shadow: 0 4px #477a10; grid-column: 3; grid-row: 1; }
        #btn-back:active { box-shadow: 0 1px #477a10; }

        #btn-up    { grid-column: 2; grid-row: 1; }
        #btn-left  { grid-column: 1; grid-row: 2; }
        #btn-space { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down  { grid-column: 2; grid-row: 3; }

        /* ================= АДАПТАЦИЯ ПОД ЭКРАНЫ МОБИЛЬНЫХ ТЕЛЕФОНОВ ================= */

        /* 1. Маленькие или узкие смартфоны (например, iPhone SE, старые модели) */
        @media screen and (max-width: 360px) {
            body { padding: 5px; }
            h1 { font-size: 0.9rem; margin-bottom: 5px; }
            .phone-wrapper { padding: 10px; gap: 8px; }
            .screen { padding: 5px; }
            .hud { font-size: 0.55rem; padding-bottom: 4px; margin-bottom: 4px; }
            .dpad-container { gap: 5px; }
            .btn-dir, .btn-center { height: 48px; font-size: 1rem; }
            .btn-side { height: 36px; font-size: 0.55rem; }
        }

        /* 2. Короткие экраны в ландшафтном режиме или старые широкоформатники */
        @media screen and (max-height: 650px) {
            body { justify-content: flex-start; overflow-y: auto; } /* Разрешаем скролл, если экран критически мал по высоте */
            h1 { display: none; } /* Скрываем заголовок, чтобы освободить место */
            .phone-wrapper { gap: 8px; padding: 10px; }
            .btn-dir, .btn-center { height: 45px; }
            .btn-side { height: 35px; }
        }
    </style>
</head>

            try {

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startBackgroundMusic();
            }
        }

        function startBackgroundMusic() {
            if (!soundEnabled || musicNode || !audioCtx) return;
            const bufferSize = audioCtx.sampleRate * 2; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            const notes = [110, 130, 146, 165, 110, 130, 196, 165]; 
            const noteLen = Math.floor(bufferSize / notes.length);
            for (let i = 0; i < bufferSize; i++) {
                const noteIdx = Math.floor(i / noteLen);
                const freq = notes[noteIdx];
                data[i] = Math.sin(2 * Math.PI * freq * (i / audioCtx.sampleRate)) > 0 ? 0.015 : -0.015;
            }
            musicNode = audioCtx.createBufferSource();
            musicNode.buffer = buffer;
            musicNode.loop = true;
            const musicGain = audioCtx.createGain();
            musicGain.gain.setValueAtTime(isPaused ? 0 : 0.6, audioCtx.currentTime); 
            musicNode.connect(musicGain);
            musicGain.connect(audioCtx.destination);
            musicNode.start();
            musicNode.gainNode = musicGain;
        }

        function updateMusicVolume() {
            if (musicNode && musicNode.gainNode) {
                musicNode.gainNode.gain.setValueAtTime((isPaused || !soundEnabled) ? 0 : 0.6, audioCtx.currentTime);
            }
        }

        function stopBackgroundMusic() {
            if (musicNode) {
                try { musicNode.stop(); } catch(e){}
                musicNode.disconnect();
                musicNode = null;
            }
        }

        function triggerVibration() {
            if (navigator.vibrate) navigator.vibrate(5);
        }

        function completeTask(id) {
            if (!tasks[id]) {
                tasks[id] = true;
                playSound("taskComplete");
                spawnGift();

        }

        function unlockAchievement(id) {

                addFloatingScore(snake[0].x, snake[0].y, "ACHIEVEMENT!");

        function addFloatingScore(x, y, text) {
            floatingScores.push({ x: x * 20 + 10, y: y * 20, text: text, alpha: 1.0, life: 15 });
        }

        function generateObstacles() {
            obstacles = [];
            flashingObstacleIdx = -1;
            if (currentModeIdx !== 2 && currentModeIdx !== 4) return; 
            while (obstacles.length < 8) {
                let obsX = Math.floor(Math.random() * tileCount);
                let obsY = Math.floor(Math.random() * tileCount);
                let distance = Math.abs(obsX - 10) + Math.abs(obsY - 10);
                if (distance > 3) {
                    if (!obstacles.some(o => o.x === obsX && o.y === obsY)) {
                        obstacles.push({x: obsX, y: obsY});
                    }
                }
            }
        }

        function moveOneObstacle() {
            if (obstacles.length === 0) return;
            let idx = Math.floor(Math.random() * obstacles.length);
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(part => part.x === x && part.y === y) || 
                                     obstacles.some(o => o.x === x && o.y === y) ||
                                     ghostTrails.some(g => g.x === x && g.y === y) ||
                                     (food.x === x && food.y === y) || 
                                     (gift && gift.x === x && gift.y === y);
                    if (!isOccupied && (Math.abs(x - snake[0].x) + Math.abs(y - snake[0].y) > 2)) {
                        validPositions.push({x, y});
                    }
                }
            }
            if (validPositions.length > 0) {
                obstacles[idx] = validPositions[Math.floor(Math.random() * validPositions.length)];
            }
        }

        function spawnGift() {
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(part => part.x === x && part.y === y) || 
                                     obstacles.some(o => o.x === x && o.y === y) ||
                                     ghostTrails.some(g => g.x === x && g.y === y) ||
                                     (food.x === x && food.y === y) || 
                                     (gift && gift.x === x && gift.y === y);
                    if (!isOccupied) validPositions.push({x, y});
                }
            }
            if (validPositions.length > 0) {
                gift = validPositions[Math.floor(Math.random() * validPositions.length)];
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); };
            if (type === "eat") {
                osc.type = "square";
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === "bigEat") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === "shrinkEat") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === "turboEat") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === "giftEat") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.07);
                osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.14);
                osc.frequency.setValueAtTime(1046, audioCtx.currentTime + 0.21);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === "die") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === "taskComplete") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            } else if (type === "introBeep") {
                osc.type = "square";
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        async function sendScoreToFirebase(finalScore) {
            if (isGameSubmitting || finalScore <= 0) return;
            if (usedAIThisSession) return;
            isGameSubmitting = true;
            try {
                await addDoc(collection(db, "global_leaderboard"), {
                    playerName: playerName,
                    score: Number(finalScore),
                    mode: Number(currentModeIdx), 
                    timestamp: new Date()
                });
                await loadBestSingleScore(); 
            } catch (e) { console.error(e); }
            finally { isGameSubmitting = false; }
        }

        async function loadBestSingleScore() {
            hiScore = localStorage.getItem(`snake_hi_score_mode_${currentModeIdx}`) || 0;
            bestPlayerName = localStorage.getItem(`snake_best_player_mode_${currentModeIdx}`) || "---";
            updateHUD();
            try {
                const q = query(
                    collection(db, "global_leaderboard"), 
                    where("mode", "==", currentModeIdx),
                    orderBy("score", "desc"), 
                    limit(1)
                );
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) {
                    const bestDoc = querySnapshot.docs[0].data();
                    hiScore = bestDoc.score;
                    bestPlayerName = bestDoc.playerName;
                    localStorage.setItem(`snake_hi_score_mode_${currentModeIdx}`, hiScore);
                    localStorage.setItem(`snake_best_player_mode_${currentModeIdx}`, bestPlayerName);
                    updateHUD();
                }
            } catch (e) { console.error(e); }
        }

        async function loadTopTen() {
            isLoadingLeaderboard = true;
            try {
                const q = query(
                    collection(db, "global_leaderboard"), 
                    where("mode", "==", currentModeIdx),
                    orderBy("score", "desc"), 
                    limit(10)
                );
                const querySnapshot = await getDocs(q);
                globalTopTen = [];
                querySnapshot.forEach((doc) => { globalTopTen.push(doc.data()); });
            } catch (e) { console.error(e); }
            isLoadingLeaderboard = false;
        }

        function updateHUD() {
            const t = i18n[currentLang];
            const aiTag = aiMode ? " *AI*" : "";
            const modeTag = ` [${t.gameModes[currentModeIdx] || "MODE"}]`;
            scoreElement.innerText = `${t.score}:${score}${aiTag}${modeTag}`;
            if (bestPlayerName === "---") {
                hiScoreElement.innerText = `${t.hi}: ${t.loading}`;
            } else {
                hiScoreElement.innerText = `${t.hi}:${hiScore} ${t.bestBy} ${bestPlayerName}`;
            }
        }

        function gameLoop() {
            if (currentScreen === "INTRO" || currentScreen === "EDIT_NAME") {
                hudElement.style.visibility = "hidden";
            } else {
                hudElement.style.visibility = "visible";
            }

            if (currentScreen === "INTRO") {
                introScreen.draw(ctx, canvas.width, canvas.height, isDarkTheme, flashToggle, playSound);
                return;
            }

            clearCanvas();
            const t = i18n[currentLang];
            flashCounter++; if (flashCounter % 3 === 0) flashToggle = !flashToggle;
            rainbowHue = (rainbowHue + 5) % 360; 
            if (isPaused) { 
                timerContainer.style.visibility = "hidden";
                drawObstacles(); drawGhostTrails(); drawSnake(); drawFood(); drawGift();
                drawFloatingScores();
                if (currentScreen === "MAIN") {
                    if (gameOver) drawPixelMenu(t.gameOver);
                    else drawPixelMenu(t.pause);
                }
                else if (currentScreen === "SETTINGS") drawPixelMenu(t.settings);
                else if (currentScreen === "MODES") drawModesScreen();
                else if (currentScreen === "LEADERBOARD") drawLeaderboardScreen();
                else if (currentScreen === "TASKS") drawTasksScreen();
                else if (currentScreen === "ACHIEVEMENTS") drawAchievementsScreen();
                else if (currentScreen === "ABOUT") drawAboutScreen();
                return; 
            }
            if (foodType !== "REGULAR") {
                let currentTickSpeed = isTurboActive ? speeds[2] : speeds[currentSpeedMode];
                bonusTimer -= currentTickSpeed;
                timerContainer.style.visibility = "visible";
                let maxTime = maxBigFoodTime;
                if (foodType === "SHRINK") maxTime = maxShrinkTime;
                if (foodType === "TURBO") maxTime = maxTurboTime;
                const percentage = Math.max(0, (bonusTimer / maxTime) * 100);
                timerBar.style.width = percentage + "%";
                if (bonusTimer <= 0) { 
                    foodType = "REGULAR"; 
                    isTurboActive = false;
                    timerContainer.style.visibility = "hidden"; 
                    updateTicker();
                    generateFood(); 
                }
            } else { 
                timerContainer.style.visibility = "hidden"; 
            }
            if (aiMode) {
                const move = makeAIMove(snake, gift, food, tileCount, obstacles, ghostTrails, currentModeIdx);
                if (move) {
                    if (move === "UP") { nextDx = 0; nextDy = -1; }
                    if (move === "DOWN") { nextDx = 0; nextDy = 1; }
                    if (move === "LEFT") { nextDx = -1; nextDy = 0; }
                    if (move === "RIGHT") { nextDx = 1; nextDy = 0; }
                }
            }
            dx = nextDx; dy = nextDy;
            isTurningThisTick = false; 
            if (currentModeIdx === 4) {
                movingObstacleTick++;
                if (movingObstacleTick >= 12) {
                    if (flashingObstacleIdx === -1) flashingObstacleIdx = Math.floor(Math.random() * obstacles.length);
                }
                if (movingObstacleTick >= 15) {
                    moveOneObstacle();
                    flashingObstacleIdx = -1;
                    movingObstacleTick = 0;
                }
            }
            moveSnake();
            if (!gameOver) { 
                checkCollision(); 
                drawObstacles(); drawGhostTrails(); drawFood(); drawGift(); drawSnake(); 
                drawFloatingScores();
            }
        }

        function updateTicker() {
            if (gameInterval) clearInterval(gameInterval);
            let activeSpeed = isTurboActive ? speeds[2] : speeds[currentSpeedMode];
            let tickSpeed = (currentScreen === "INTRO") ? 33 : activeSpeed;
            gameInterval = setInterval(gameLoop, tickSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = isDarkTheme ? "#0d1117" : "#ffffff"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = isDarkTheme ? "rgba(255, 255, 255, 0.04)" : "rgba(0, 0, 0, 0.04)";
            ctx.beginPath();
            for (let i = 0; i < tileCount; i++) {
                ctx.moveTo(i*20,0); ctx.lineTo(i*20,400); 
                ctx.moveTo(0,i*20); ctx.lineTo(400,i*20);
            }
            ctx.stroke();
        }

        function drawObstacles() {
            if (currentModeIdx !== 2 && currentModeIdx !== 4) return; 
            obstacles.forEach((obs, idx) => {
                if (currentModeIdx === 4 && idx === flashingObstacleIdx && !flashToggle) return;
                ctx.fillStyle = isDarkTheme ? "#58a6ff" : "#2b3a4a";
                ctx.fillRect(obs.x * 20 + 2, obs.y * 20 + 2, 16, 16);
                ctx.strokeStyle = isDarkTheme ? "#0d1117" : "#ffffff"; 
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x * 20 + 5, obs.y * 20 + 5, 10, 10);
            });
        }

        function drawGhostTrails() {
            if (currentModeIdx !== 3) return; 
            ghostTrails.forEach(gt => {
                ctx.fillStyle = isDarkTheme 
                    ? (flashToggle ? "rgba(88, 166, 255, 0.4)" : "rgba(88, 166, 255, 0.15)")
                    : (flashToggle ? "rgba(43, 58, 74, 0.5)" : "rgba(43, 58, 74, 0.2)");
                ctx.fillRect(gt.x * 20 + 4, gt.y * 20 + 4, 12, 12);
            });
        }

        function drawSnake() {
            const activeColor = snakeColors[currentSnakeColorIdx];
            snake.forEach((part, i) => {
                if (activeColor.hex === "RAINBOW") {
                    ctx.fillStyle = `hsl(${(rainbowHue + i * 15) % 360}, 90%, 45%)`;
                } else if (activeColor.hex === "DYNAMIC") {
                    ctx.fillStyle = isDarkTheme ? "#ecf2f8" : "#2b3a4a";
                } else {
                    ctx.fillStyle = activeColor.hex; 
                }
                ctx.fillRect(part.x * 20 + 1, part.y * 20 + 1, 18, 18);
                if (i === 0) { 
                    if (activeColor.eyeHex === "DYNAMIC") ctx.fillStyle = isDarkTheme ? "#0d1117" : "#ffffff";
                    else ctx.fillStyle = activeColor.eyeHex; 
                    ctx.fillRect(part.x * 20 + 4, part.y * 20 + 4, 4, 4); 
                }
            });
        }

        function drawFood() {
            if (foodType !== "REGULAR" && !flashToggle) return; 
            const px = food.x * 20; const py = food.y * 20;
            const darkSubColor = isDarkTheme ? "#0d1117" : "#2b3a4a";
            if (foodType === "REGULAR") {
                ctx.fillStyle = "#ff4d4d"; ctx.fillRect(px + 5, py + 4, 10, 12); ctx.fillRect(px + 4, py + 6, 12, 8);
                ctx.fillRect(px + 6, py + 3, 8, 1); ctx.fillRect(px + 6, py + 16, 8, 1);
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 9, py + 13, 2, 2);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 6, 2, 2); ctx.fillRect(px + 8, py + 6, 1, 1);
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 9, py + 1, 1, 2);
                ctx.fillStyle = "#4e8a10"; ctx.fillRect(px + 10, py + 1, 2, 1);
            } else if (foodType === "BIG") {
                ctx.fillStyle = "#ffb900"; ctx.fillRect(px + 5, py + 4, 10, 12); ctx.fillRect(px + 4, py + 6, 12, 8);
                ctx.fillRect(px + 6, py + 3, 8, 1); ctx.fillRect(px + 6, py + 16, 8, 1);
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 9, py + 13, 2, 2);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 6, 2, 2); ctx.fillRect(px + 8, py + 6, 1, 1);
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 9, py + 1, 1, 2);
                ctx.fillStyle = "#2d520a"; ctx.fillRect(px + 10, py + 1, 2, 1);
            } else if (foodType === "SHRINK") {
                ctx.fillStyle = isDarkTheme ? "#1a1c1e" : "#f0f2f5"; ctx.fillRect(px + 8, py + 2, 4, 1); 
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 9, py + 3, 2, 3); 
                ctx.fillStyle = "#1e88e5"; ctx.fillRect(px + 5, py + 7, 10, 10); ctx.fillRect(px + 4, py + 9, 12, 6); ctx.fillRect(px + 6, py + 6, 8, 1);
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 5, py + 8, 10, 1); ctx.fillRect(px + 11, py + 11, 2, 2);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 10, 2, 3); ctx.fillRect(px + 8, py + 10, 1, 1);
            } else if (foodType === "TURBO") { 
                ctx.fillStyle = "#ba68c8"; ctx.fillRect(px + 4, py + 4, 12, 12);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(px + 6, py + 6, 3, 3);
                ctx.fillStyle = darkSubColor; ctx.fillRect(px + 9, py + 2, 2, 2);
            }
        }

        function drawGift() {
            if (!gift) return;
            const px = gift.x * 20; const py = gift.y * 20;
            const darkSubColor = isDarkTheme ? "#0d1117" : "#2b3a4a";
            ctx.fillStyle = "#ff4d4d"; ctx.fillRect(px + 3, py + 7, 14, 11); ctx.fillRect(px + 2, py + 5, 16, 3);

                ctx.fillRect(px + 6, py + 2, 3, 3); ctx.fillRect(px + 11, py + 2, 3, 3);

            } else {
                ctx.fillRect(px + 5, py + 3, 3, 2); ctx.fillRect(px + 12, py + 3, 3, 2);

            }
        }

        function drawFloatingScores() {
            ctx.save();
            ctx.font = "8px 'Press Start 2P'";
            ctx.textAlign = "center";
            for (let i = floatingScores.length - 1; i >= 0; i--) {
                let fs = floatingScores[i];
                ctx.fillStyle = isDarkTheme ? `rgba(236, 242, 248, ${fs.alpha})` : `rgba(43, 58, 74, ${fs.alpha})`;
                ctx.fillText(fs.text, fs.x, fs.y);
                fs.y -= 1.2; fs.life--;
                if (fs.life <= 5) fs.alpha -= 0.2;
                if (fs.life <= 0) floatingScores.splice(i, 1);
            }
            ctx.restore();
        }

        function drawLeaderboardScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = isDarkTheme ? "#161b22" : "#2b3a4a"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#ffffff"; ctx.font = "12px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(`${t.globalTop} [${t.gameModes[currentModeIdx] || "GAME"}]`, 200, 48); ctx.fillRect(40, 58, 320, 2);
            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            if (isLoadingLeaderboard) { ctx.textAlign = "center"; ctx.fillText(t.loading, 200, 200); }
            else if (globalTopTen.length === 0) { ctx.textAlign = "center"; ctx.fillText(t.empty, 200, 200); }
            else {
                globalTopTen.forEach((entry, idx) => {
                    let y = 88 + (idx * 26);
                    let rawName = (entry.playerName || "ANON").substring(0, 8);
                    ctx.fillText(`${String(idx + 1).padStart(2, '0')}.${rawName}`, 40, y);
                    if (idx < 3) { ctx.font = "14px Arial"; ctx.fillText(["🥇","🥈","🥉"][idx], 40 + 35 + (rawName.length * 11) + 5, y + 2); ctx.font = "11px 'Press Start 2P'"; }
                    ctx.fillText(`:${entry.score}`, 275, y);
                });
            }
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(t.back, 200, 360);
        }

        function drawTasksScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = isDarkTheme ? "#161b22" : "#2b3a4a"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#ffffff"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.tasksTitle, 200, 45); ctx.fillRect(40, 54, 320, 2);
            ctx.save(); ctx.beginPath(); ctx.rect(30, 60, 340, 265); ctx.clip();
            ctx.font = "11px 'Press Start 2P'"; ctx.textAlign = "left"; 
            const taskKeys = ["score50", "score100", "score500", "score1000", "goldFood", "blueFood"];
            taskKeys.forEach((key, idx) => {
                let y = 85 + (idx * 52) - tasksScrollY; let isDone = tasks[key];
                ctx.fillStyle = isDone ? "#ffffff" : (isDarkTheme ? "#484f58" : "#6c7d93");
                ctx.fillText(`${isDone ? "[X]" : "[ ]"} ${t.taskList[key]}`, 42, y);
                ctx.font = "7.5px 'Press Start 2P'"; ctx.fillStyle = isDone ? "#ffffff" : (isDarkTheme ? "#8b949e" : "#a2b0c3"); 
                ctx.fillText(t.taskList[key + "Desc"], 42, y + 15);
                ctx.font = "11px 'Press Start 2P'";
            });
            ctx.restore();
            ctx.fillStyle = isDarkTheme ? "#21262d" : "#1b2530"; ctx.fillRect(355, 65, 4, 255); 
            ctx.fillStyle = "#ffffff"; ctx.fillRect(355, 65 + (tasksScrollY / maxTasksScrollY) * 165, 4, 90); 
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(t.back, 200, 365);
        }

        function drawAchievementsScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = isDarkTheme ? "#161b22" : "#2b3a4a"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#ffffff"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.achievementsTitle, 200, 45); ctx.fillRect(40, 54, 320, 2);
            
            ctx.save(); ctx.beginPath(); ctx.rect(30, 60, 340, 265); ctx.clip();

            const achKeys = Object.keys(achievements);
            const hiddenKeys = ["cyborg", "hawkTactics", "dietMode", "identityCrisis", "greed"];

            achKeys.forEach((key, idx) => {
                let y = 85 + (idx * 45) - achScrollY;
                let isDone = achievements[key];
                let isHidden = hiddenKeys.includes(key);

                ctx.font = "10px 'Press Start 2P'";
                ctx.textAlign = "left";
                
                if (isHidden) {
                    ctx.fillStyle = isDone ? "#ffb900" : (isDarkTheme ? "#484f58" : "#6c7d93");
                } else {
                    ctx.fillStyle = isDone ? "#ffffff" : (isDarkTheme ? "#484f58" : "#6c7d93");
                }

                if (isHidden && !isDone) {
                    ctx.fillText(`[ ] ${t.unknownTask}`, 42, y);
                    ctx.font = "7px 'Press Start 2P'";
                    ctx.fillStyle = isDarkTheme ? "#58a6ff" : "#a2b0c3";
                    ctx.fillText(`* ${t.secretTaskDesc} *`, 42, y + 13);
                } else {
                    ctx.fillText(`${isDone ? "[X]" : "[ ]"} ${t.achList[key]}`, 42, y);
                    ctx.font = "7px 'Press Start 2P'";
                    ctx.fillStyle = isDone ? "#ffffff" : (isDarkTheme ? "#8b949e" : "#a2b0c3");
                    ctx.fillText(t.achList[key + "Desc"], 42, y + 13);
                }
            });

            ctx.restore();
            ctx.fillStyle = isDarkTheme ? "#21262d" : "#1b2530"; ctx.fillRect(355, 65, 4, 255); 
            ctx.fillStyle = "#ffffff"; ctx.fillRect(355, 65 + (achScrollY / maxAchScrollY) * 165, 4, 90); 
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(t.back, 200, 365);
        }

        function drawAboutScreen() {
            const t = i18n[currentLang];
            ctx.fillStyle = isDarkTheme ? "#161b22" : "#2b3a4a"; ctx.fillRect(20, 15, 360, 370);
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(26, 21, 348, 358);
            ctx.fillStyle = "#ffffff"; ctx.font = "14px 'Press Start 2P'"; ctx.textAlign = "center"; 
            ctx.fillText(t.aboutTitle, 200, 45); ctx.fillRect(40, 54, 320, 2);
            ctx.save(); ctx.beginPath(); ctx.rect(30, 60, 340, 265); ctx.clip();
            const textLines = externalAboutData[currentLang] || [];
            textLines.forEach((line, idx) => {
                let y = 85 + (idx * 22) - aboutScrollY; 
                ctx.textAlign = "left";
                if (line.includes("GITHUB")) { ctx.fillStyle = "#58a6ff"; ctx.font = "7px 'Press Start 2P'"; ctx.fillRect(40, y + 2, ctx.measureText(line).width, 1); }
                else { ctx.font = (idx === 0) ? "10px 'Press Start 2P'" : "7px 'Press Start 2P'"; let isHeader = idx === 0 || line.startsWith("УПРАВЛЕНИЕ:") || line.startsWith("CONTROLS:"); ctx.fillStyle = isHeader ? "#ffffff" : (isDarkTheme ? "#8b949e" : "#a2b0c3"); }
                let textX = 40, itemType = null;
                if (line.startsWith("ЯБЛОКО:") || line.startsWith("APPLE:")) itemType = "REGULAR"; else if (line.startsWith("ЗОЛОТОЕ:") || line.startsWith("GOLDEN:")) itemType = "BIG"; else if (line.startsWith("СИНЕЕ:") || line.startsWith("BLUE:")) itemType = "SHRINK"; else if (line.startsWith("ФИОЛЕТ:") || line.startsWith("PURPLE:")) itemType = "TURBO"; else if (line.startsWith("ПОДАРОК:") || line.startsWith("GIFT:")) itemType = "GIFT";
                if (itemType) { textX = 70; ctx.save(); let oldFood = { ...food }, oldType = foodType, oldGift = gift ? { ...gift } : null; if (itemType === "GIFT") { gift = { x: 40 / 20, y: (y - 12) / 20 }; drawGift(); } else { food = { x: 40 / 20, y: (y - 12) / 20 }; foodType = itemType; let oldFlash = flashToggle; flashToggle = true; drawFood(); flashToggle = oldFlash; } food = oldFood; foodType = oldType; gift = oldGift; ctx.restore(); }
                ctx.fillText(line, textX, y);
            });
            ctx.restore();
            ctx.fillStyle = isDarkTheme ? "#21262d" : "#1b2530"; ctx.fillRect(355, 65, 4, 255); 
            ctx.fillStyle = "#ffffff"; ctx.fillRect(355, 65 + (aboutScrollY / maxAboutScrollY) * 135, 4, 120); 
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(t.back, 200, 365);
        }

        canvas.addEventListener("click", (e) => {
            if (currentScreen === "ABOUT" && externalAboutData) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
                const clickX = (e.clientX - rect.left) * scaleX, clickY = (e.clientY - rect.top) * scaleY;
                const lines = externalAboutData[currentLang] || [];
                const githubIdx = lines.findIndex(l => l.includes("GITHUB"));
                if (githubIdx !== -1) {
                    const lineY = 85 + (githubIdx * 22) - aboutScrollY;
                    if (clickY > lineY - 15 && clickY < lineY + 5 && clickX > 35 && clickX < 350) { triggerVibration(); window.open("https://github.com/AlexanderRU44/NETSNAKE_10", "_blank"); }
                }
            }
        });

        function openNameInput() {
            const t = i18n[currentLang];
            overlayLabel.innerText = t.enterName; btnSaveName.innerText = t.saveBtn; 
            nameInput.value = playerName; nameOverlay.style.display = "flex";
            currentScreen = "EDIT_NAME"; setTimeout(() => nameInput.focus(), 50); 
        }

        function saveNameInput() {
            let val = nameInput.value.trim().toUpperCase();
            val = val.replace(/[^A-ZА-Я0-9_]/g, '');
            if (val === "") val = "PLAYER"; playerName = val.substring(0, 8);
            localStorage.setItem("snake_player_name", playerName);
            nameOverlay.style.display = "none"; currentScreen = "SETTINGS"; updateHUD();
        }

        btnSaveName.onclick = (e) => { e.preventDefault(); triggerVibration(); saveNameInput(); };
        nameInput.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); saveNameInput(); } };

        function moveSnake() {
            let h = { x: snake[0].x + dx, y: snake[0].y + dy };
            const bordersAreDeadly = (currentModeIdx === 1);
            if (!bordersAreDeadly || aiMode) {
                if (h.x < 0) h.x = tileCount - 1; if (h.x > tileCount - 1) h.x = 0;
                if (h.y < 0) h.y = tileCount - 1; if (h.y > tileCount - 1) h.y = 0;
            }
            if (currentModeIdx === 3 && snake.length > 0) ghostTrails.push({ x: snake[snake.length - 1].x, y: snake[snake.length - 1].y, ttl: 25 });
            ghostTrails.forEach(gt => gt.ttl--); ghostTrails = ghostTrails.filter(gt => gt.ttl > 0);
            snake.unshift(h);
            if (gift && h.x === gift.x && h.y === gift.y) { 
                playSound("giftEat"); score += 50; addFloatingScore(h.x, h.y, "+50");
                gift = null; checkScoreTasks(); updateHUD(); 
            }
            if (h.x === food.x && h.y === food.y) {
                let activeSpeed = isTurboActive ? speeds[2] : speeds[currentSpeedMode];
                
                if (foodType !== "REGULAR" && bonusTimer > 0 && bonusTimer < (activeSpeed * 5)) {
                    unlockAchievement("hawkTactics");
                }

                if (foodType === "REGULAR") { 
                    playSound("eat"); 
                    let gain = isTurboActive ? 3 : 1; 
                    score += gain; 
                    addFloatingScore(h.x, h.y, `+${gain}`); 
                    
                    regularApplesStreak++;
                    if (regularApplesStreak >= 15) {
                        unlockAchievement("vegetarian");
                    }
                } 
                else if (foodType === "BIG") { 
                    playSound("bigEat"); 
                    score += 10; 
                    addFloatingScore(h.x, h.y, "+10"); 
                    goldFoodEaten = true; 
                    completeTask("goldFood"); 
                    regularApplesStreak = 0;
                } 
                else if (foodType === "SHRINK") { 
                    playSound("shrinkEat"); 
                    blueFoodEaten = true; 
                    completeTask("blueFood"); 
                    regularApplesStreak = 0;

                    if (snake.length === 3) {
                        unlockAchievement("dietMode");
                    }

                    let newLength = Math.max(1, Math.floor(snake.length / 2)); 
                    while (snake.length > newLength) snake.pop(); 
                    addFloatingScore(h.x, h.y, "SHRINK"); 
                }
                else if (foodType === "TURBO") { 
                    playSound("turboEat"); 
                    isTurboActive = true; 
                    bonusTimer = maxTurboTime; 
                    addFloatingScore(h.x, h.y, "TURBO!"); 
                    unlockAchievement("energyDrink");
                    regularApplesStreak = 0;
                    updateTicker(); 
                }
                
                checkScoreTasks(); 
                if (foodType !== "TURBO") { 
                    foodType = "REGULAR"; 
                    if (!isTurboActive) timerContainer.style.visibility = "hidden"; 
                } 
                updateHUD(); 
                generateFood();
            } else { 
                snake.pop(); 
            }
        }

        function checkScoreTasks() {
            if (score >= 10) unlockAchievement("firstBlood");
            if (score >= 50) completeTask("score50"); 
            if (score >= 100) completeTask("score100"); 
            if (score >= 500) completeTask("score500"); 
            if (score >= 1000) completeTask("score1000");

            if (currentModeIdx === 3 && score > 30) {
                unlockAchievement("blindManeuver");
            }
        }

        function generateFood() {
            let validPositions = [];
            for (let x = 0; x < tileCount; x++) {
                for (let y = 0; y < tileCount; y++) {
                    let isOccupied = snake.some(p => p.x === x && p.y === y) || obstacles.some(o => o.x === x && o.y === y) || ghostTrails.some(g => g.x === x && g.y === y) || (gift && gift.x === x && gift.y === y);
                    if (!isOccupied) validPositions.push({x, y});
                }
            }
            if (validPositions.length === 0) { if (!aiMode) endGame(); return; }
            food = validPositions[Math.floor(Math.random() * validPositions.length)];
            if (isTurboActive) { foodType = "REGULAR"; return; }
            let rand = Math.random();
            if (rand < 0.05 && !blueFoodEaten) { foodType = "SHRINK"; bonusTimer = maxShrinkTime; } 
            else if (rand < 0.10) { foodType = "TURBO"; bonusTimer = maxTurboTime; } 
            else if (rand < 0.20 && !goldFoodEaten) { foodType = "BIG"; bonusTimer = maxBigFoodTime; } 
            else foodType = "REGULAR";
        }

        function checkCollision() {
            if (aiMode) return; 
            let h = snake[0];
            
            if (foodType === "BIG") {
                let distToGold = Math.abs(h.x - food.x) + Math.abs(h.y - food.y);
                if (distToGold === 1) {
                    if (currentModeIdx === 1 && (h.x + dx < 0 || h.x + dx > tileCount - 1 || h.y + dy < 0 || h.y + dy > tileCount - 1)) {
                        unlockAchievement("greed");
                    }
                    if ((currentModeIdx === 2 || currentModeIdx === 4) && obstacles.some(obs => obs.x === (h.x + dx) && obs.y === (h.y + dy))) {
                        unlockAchievement("greed");
                    }
                    for (let i = 1; i < snake.length; i++) {
                        if ((h.x + dx) === snake[i].x && (h.y + dy) === snake[i].y) {
                            unlockAchievement("greed");
                        }
                    }
                }
            }

            if (currentModeIdx === 1 && (h.x < 0 || h.x > tileCount - 1 || h.y < 0 || h.y > tileCount - 1)) { endGame(); return; }
            for(let i=1; i<snake.length; i++) if(h.x===snake[i].x && h.y===snake[i].y) endGame();
            if ((currentModeIdx === 2 || currentModeIdx === 4) && obstacles.some(obs => obs.x === h.x && obs.y === h.y)) endGame(); 
            if (ghostTrails.some(gt => gt.x === h.x && gt.y === h.y)) endGame();
        }

        function endGame() {
            playSound("die"); gameOver = true; isPaused = true; isTurboActive = false;
            currentScreen = "MAIN"; mainMenuSelection = 0; mainMenuScrollY = 0; 
            
            totalGamesPlayed++;
            localStorage.setItem("snake_total_games_played", totalGamesPlayed);
            if (totalGamesPlayed >= 5) {
                unlockAchievement("survivor");
            }
            if (currentSpeedMode === 2) {
                unlockAchievement("speedDemon");
            }

            updateMusicVolume(); updateHUD(); sendScoreToFirebase(score); 
        }

        function handleMenuPress() { initAudio(); if (currentScreen !== "EDIT_NAME" && currentScreen !== "INTRO") { if (!isPaused) { isPaused = true; updateMusicVolume(); } currentScreen = "MAIN"; } }
        function handleBackPress() { initAudio(); if (currentScreen !== "EDIT_NAME" && currentScreen !== "INTRO") { if (["SETTINGS","LEADERBOARD","TASKS","ACHIEVEMENTS","MODES","ABOUT"].includes(currentScreen)) currentScreen = "MAIN"; } }

        async function handleCenter() {
            initAudio();
            if (currentScreen === "INTRO") {
                if (introScreen.isReady()) { 
                    currentScreen = "MAIN";
                    updateTicker();
                }
                return;
            }
            if (currentScreen === "EDIT_NAME") { saveNameInput(); return; }
            
            if (!isPaused && !gameOver && cheatSequence.length === 3 && cheatSequence.every((val, i) => val === targetCheat[i])) {
                aiMode = !aiMode; if (aiMode) { usedAIThisSession = true; unlockAchievement("cyborg"); }
                updateHUD(); cheatSequence = []; return; 
            }
            cheatSequence = []; 
            if (currentScreen === "MAIN") {
                if (gameOver) {
                    if (mainMenuSelection === 0) reset();
                    else if (mainMenuSelection === 1) { currentScreen = "MODES"; modesMenuSelection = currentModeIdx; }
                    else if (mainMenuSelection === 2) { currentScreen = "SETTINGS"; settingsMenuSelection = 0; }
                    else if (mainMenuSelection === 3) { currentScreen = "LEADERBOARD"; loadTopTen(); }
                    else if (mainMenuSelection === 4) { currentScreen = "TASKS"; tasksScrollY = 0; }
                    else if (mainMenuSelection === 5) { currentScreen = "ACHIEVEMENTS"; achScrollY = 0; }
                    else if (mainMenuSelection === 6) { currentScreen = "ABOUT"; aboutScrollY = 0; }
                } else {
                    if (mainMenuSelection === 0) { isPaused = false; updateMusicVolume(); }
                    else if (mainMenuSelection === 1) reset();
                    else if (mainMenuSelection === 2) { currentScreen = "MODES"; modesMenuSelection = currentModeIdx; }
                    else if (mainMenuSelection === 3) { currentScreen = "SETTINGS"; settingsMenuSelection = 0; }
                    else if (mainMenuSelection === 4) { currentScreen = "LEADERBOARD"; loadTopTen(); }
                    else if (mainMenuSelection === 5) { currentScreen = "TASKS"; tasksScrollY = 0; }
                    else if (mainMenuSelection === 6) { currentScreen = "ACHIEVEMENTS"; achScrollY = 0; }
                    else if (mainMenuSelection === 7) { currentScreen = "ABOUT"; aboutScrollY = 0; }
                }
            } else if (currentScreen === "MODES") { currentModeIdx = modesMenuSelection; updateHUD(); await loadBestSingleScore(); reset(); }
            else if (currentScreen === "SETTINGS") {
                let s = settingsMenuSelection;
                if (s === 0) { currentSpeedMode = (currentSpeedMode + 1) % 3; updateTicker(); }
                else if (s === 1) { soundEnabled = !soundEnabled; localStorage.setItem("snake_sound_enabled", soundEnabled); if (soundEnabled) startBackgroundMusic(); else stopBackgroundMusic(); updateMusicVolume(); }
                else if (s === 2) { currentLang = (currentLang === "RU") ? "EN" : "RU"; updateHUD(); }
                else if (s === 3) openNameInput();
                else if (s === 4) { let nextColorIdx = (currentSnakeColorIdx + 1) % snakeColors.length; if (nextColorIdx === 4 && !isChameleonUnlocked) nextColorIdx = 0; currentSnakeColorIdx = nextColorIdx; localStorage.setItem("snake_color_idx", currentSnakeColorIdx); }
                else if (s === 5) { 
                    isDarkTheme = !isDarkTheme; 
                    localStorage.setItem("snake_dark_theme", isDarkTheme); 
                    applyTheme(); 
                    
                    themeChangesCount++;
                    if (themeChangesCount >= 5) {
                        unlockAchievement("identityCrisis");
                    }
                }
            } else if (!isPaused) { isPaused = true; updateMusicVolume(); }
        }

        function reset() {
            gift = null; goldFoodEaten = false; blueFoodEaten = false; isTurboActive = false; snake = [{x: 10, y: 10}]; ghostTrails = []; floatingScores = []; movingObstacleTick = 0; flashingObstacleIdx = -1; generateObstacles(); dx = 1; dy = 0; nextDx = 1; nextDy = 0; score = 0; gameOver = false; isPaused = false; foodType = "REGULAR"; aiMode = false; usedAIThisSession = false; mainMenuSelection = 0; mainMenuScrollY = 0; timerContainer.style.visibility = "hidden"; regularApplesStreak = 0; generateFood(); updateMusicVolume(); updateTicker(); updateHUD(); cheatSequence = [];
        }

        function handleInput(act) {
            if (currentScreen === "EDIT_NAME" || currentScreen === "INTRO") return;
            initAudio();
            if (!isPaused) {
                cheatSequence.push(act); if (cheatSequence.length > 3) cheatSequence.shift(); if (aiMode || isTurningThisTick) return; 
                if (act === "UP" && dy === 0) { nextDx = 0; nextDy = -1; isTurningThisTick = true; }
                else if (act === "DOWN" && dy === 0) { nextDx = 0; nextDy = 1; isTurningThisTick = true; }
                else if (act === "LEFT" && dx === 0) { nextDx = -1; nextDy = 0; isTurningThisTick = true; }
                else if (act === "RIGHT" && dx === 0) { nextDx = 1; nextDy = 0; isTurningThisTick = true; }
            } else {
                if (currentScreen === "MAIN") { let max = gameOver ? 6 : 7; if (act === "UP") mainMenuSelection = (mainMenuSelection <= 0) ? max : mainMenuSelection - 1; if (act === "DOWN") mainMenuSelection = (mainMenuSelection >= max) ? 0 : mainMenuSelection + 1; }
                else if (currentScreen === "MODES") { if (act === "UP") modesMenuSelection = (modesMenuSelection <= 0) ? 4 : modesMenuSelection - 1; if (act === "DOWN") modesMenuSelection = (modesMenuSelection >= 4) ? 0 : modesMenuSelection + 1; }
                else if (currentScreen === "SETTINGS") { let max = 5; if (act === "UP") settingsMenuSelection = (settingsMenuSelection <= 0) ? max : settingsMenuSelection - 1; if (act === "DOWN") settingsMenuSelection = (settingsMenuSelection >= max) ? 0 : settingsMenuSelection + 1; }
                else if (currentScreen === "TASKS") { if (act === "UP") tasksScrollY = Math.max(0, tasksScrollY - 20); if (act === "DOWN") tasksScrollY = Math.min(maxTasksScrollY, tasksScrollY + 20); }
                else if (currentScreen === "ABOUT") { if (act === "UP") aboutScrollY = Math.max(0, aboutScrollY - 15); if (act === "DOWN") aboutScrollY = Math.min(maxAboutScrollY, aboutScrollY + 15); }
                else if (currentScreen === "ACHIEVEMENTS") { if (act === "UP") achScrollY = Math.max(0, achScrollY - 20); if (act === "DOWN") achScrollY = Math.min(maxAchScrollY, achScrollY + 20); }
            }
        }

        document.getElementById("btn-up").onclick = () => { triggerVibration(); handleInput("UP"); };
        document.getElementById("btn-down").onclick = () => { triggerVibration(); handleInput("DOWN"); };
        document.getElementById("btn-left").onclick = () => { triggerVibration(); handleInput("LEFT"); };
        document.getElementById("btn-right").onclick = () => { triggerVibration(); handleInput("RIGHT"); };
        btnMenuEl.onclick = () => { triggerVibration(); handleMenuPress(); };
        btnBackEl.onclick = () => { triggerVibration(); handleBackPress(); };
        btnSpaceEl.onclick = () => { triggerVibration(); handleCenter(); };
        
        window.addEventListener("keydown", (e) => {
            if (document.activeElement === nameInput) return; 
            const mapping = { "ArrowUp": "UP", "KeyW": "UP", "ArrowDown": "DOWN", "KeyS": "DOWN", "ArrowLeft": "LEFT", "KeyA": "LEFT", "ArrowRight": "RIGHT", "KeyD": "RIGHT", "Space": "CENTER", "Enter": "CENTER", "Escape": "BACK", "Backspace": "BACK", "KeyM": "MENU" };
            const action = mapping[e.code];
            if (!action) return;
            e.preventDefault(); 
            if (action === "CENTER") handleCenter(); else if (action === "BACK") handleBackPress(); else if (action === "MENU") handleMenuPress(); else handleInput(action);
        });

        loadAboutText(); generateObstacles(); loadBestSingleScore(); updateTicker(); updateHUD();
    </script>
</body>
